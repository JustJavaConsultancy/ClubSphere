<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
            rel="stylesheet"
            as="style"
            onload="this.rel='stylesheet'"
            href="https://fonts.googleapis.com/css2?display=swap&amp;family=Be+Vietnam+Pro%3Awght%40400%3B500%3B700%3B900&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <title>Connect - Home</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
            rel="stylesheet"
            as="style"
            onload="this.rel='stylesheet'"
            href="https://fonts.googleapis.com/css2?display=swap&family=Be+Vietnam+Pro:wght@400;500;700;900&family=Noto+Sans:wght@400;500;700;900"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        .message-bubble-user {
          background: linear-gradient(135deg, #2A2494, #3730a3);
          box-shadow: 0 4px 6px -1px rgba(42, 36, 148, 0.3);
        }

        .message-bubble-bot {
          background: rgba(255, 255, 255, 0.9);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.2);
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
          from { transform: translateX(-20px); opacity: 0; }
          to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
          0% { transform: scale(1); }
          50% { transform: scale(1.05); }
          100% { transform: scale(1); }
        }

        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-5px); }
          100% { transform: translateY(0px); }
        }

        .animate-fade-in {
          animation: fadeIn 0.6s ease-out forwards;
        }

        .animate-slide-in {
          animation: slideIn 0.5s ease-out forwards;
        }

        .animate-pulse-slow {
          animation: pulse 3s infinite ease-in-out;
        }

        .animate-float {
          animation: float 4s infinite ease-in-out;
        }

        .card-hover {
          transition: all 0.3s ease;
        }

        .card-hover:hover {
          transform: translateY(-5px);
          box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        @media (max-width: 768px) {
          .card-hover:hover {
            transform: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
          }
        }

        .tab-transition {
          transition: all 0.3s ease;
        }

        .tab-transition:hover {
          color: #2A2494;
        }

        .btn-transition {
          transition: all 0.2s ease;
        }

        .btn-transition:hover {
          transform: translateY(-2px);
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        @media (max-width: 768px) {
          .btn-transition:hover {
            transform: none;
          }
        }

        .gradient-text {
          background: linear-gradient(90deg, #2A2494, #3730a3);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        .glass-effect {
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.18);
        }

        /* Mobile menu styles */
        .mobile-menu {
          transform: translateX(-100%);
          transition: transform 0.3s ease-in-out;
        }

        .mobile-menu.open {
          transform: translateX(0);
        }

        /* Mobile bottom navigation styles */
        .mobile-bottom-nav-item {
          transition: all 0.2s ease;
          min-width: 60px;
        }

        .mobile-bottom-nav-item:active {
          transform: scale(0.95);
        }

        .mobile-bottom-nav-item.active {
          color: #2A2494;
        }

        /* Mobile bottom navigation spacing */
        .main-content-mobile {
          padding-bottom: 100px;
        }

        /* Mobile-specific improvements */
        .mobile-nav-item {
          padding: 16px 20px;
          font-size: 16px;
          border-radius: 12px;
          margin-bottom: 8px;
        }

        .mobile-nav-item:active {
          background-color: #eff6ff;
          transform: scale(0.98);
        }

        .mobile-header-btn {
          min-height: 44px;
          min-width: 44px;
          padding: 12px;
        }

        .mobile-touch-target {
          min-height: 44px;
          min-width: 44px;
        }

        .mobile-input {
          font-size: 16px;
          padding: 16px;
        }

        /* Enhanced mobile chat styles */
        @media (max-width: 640px) {
          #chat-box {
            width: calc(100vw - 32px) !important;
            height: calc(100vh - 160px) !important;
            max-width: 400px !important;
            max-height: 600px !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            border-radius: 12px !important;
            margin: 16px;
            z-index: 60 !important;
          }

          .chat-input-mobile {
            font-size: 16px;
            padding: 12px 14px;
          }
        }

        /* Ensure chat box appears above bottom navigation */
        #chat-box {
          z-index: 60;
        }

        /* Adjust chat box for very small screens */
        @media (max-width: 480px) {
          #chat-box {
            width: calc(100vw - 24px) !important;
            height: calc(100vh - 140px) !important;
            max-width: 350px !important;
            max-height: 500px !important;
            margin: 12px;
          }
        }

        /* Prevent horizontal overflow */
        * {
          box-sizing: border-box;
        }

        body {
          overflow-x: hidden;
        }

        /* Mobile container constraints */
        .container {
          max-width: 100vw;
          padding-left: 12px;
          padding-right: 12px;
        }

        /* Reduce header button sizes */
        .mobile-header-btn {
          min-height: 40px;
          min-width: 40px;
          padding: 8px;
        }

        /* Smaller profile image on mobile */
        .mobile-profile-image {
          width: 32px;
          height: 32px;
        }

        /* Reduce spacing in mobile spacing class */
        .mobile-spacing {
          padding: 12px;
        }

        /* Ensure chat box doesn't exceed viewport */
        #chat-box:not(.max-sm\\:w-full) {
          max-width: calc(100vw - 24px);
          max-height: calc(100vh - 24px);
        }

        /* Reduce font sizes slightly on very small screens */
        .text-lg {
          font-size: 1rem;
        }

        .text-xl {
          font-size: 1.125rem;
        }

        /* Extra small screens */
        @media (max-width: 480px) {
          .mobile-header-btn {
            min-height: 36px;
            min-width: 36px;
            padding: 6px;
          }

          .mobile-profile-image {
            width: 28px;
            height: 28px;
          }

          .mobile-spacing {
            padding: 8px;
          }

          /* Reduce gap between header elements */
          .header-gap {
            gap: 8px;
          }

          /* Smaller bottom nav items */
          .mobile-bottom-nav-item {
            min-width: 50px;
            padding: 8px 4px;
          }

          .mobile-bottom-nav-item .h-6 {
            height: 20px;
            width: 20px;
          }

          .mobile-bottom-nav-item .text-xs {
            font-size: 10px;
          }
        }

        /* Improved touch targets for mobile */
        .touch-target {
          min-height: 44px;
          min-width: 44px;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        /* Mobile-optimized spacing */
        .mobile-spacing {
          padding: 16px;
        }

        .mobile-card-spacing {
          padding: 20px 16px;
          margin-bottom: 16px;
        }

        /* Enhanced Mobile More Menu */
        .mobile-more-menu {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1), 0 -4px 10px -3px rgba(0, 0, 0, 0.05);
        }

        .mobile-more-menu.show {
            transform: translateY(0);
        }

        .menu-backdrop {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .menu-item {
            transition: all 0.2s ease;
            position: relative;
        }

        .menu-item:active {
            transform: scale(0.95);
        }

        .menu-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(42, 36, 148, 0.1), rgba(55, 48, 163, 0.1));
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .menu-item:hover::before {
            opacity: 1;
        }

        .menu-handle {
            width: 40px;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin: 0 auto 20px auto;
        }

        .user-profile-section {
            background: linear-gradient(135deg, rgba(42, 36, 148, 0.05), rgba(55, 48, 163, 0.05));
            border: 1px solid rgba(42, 36, 148, 0.1);
        }

        .floating-animation {
            animation: float 3s ease-in-out infinite;
        }

        .ripple-effect {
            position: relative;
            overflow: hidden;
        }

        .ripple-effect::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at center, rgba(42, 36, 148, 0.3) 0%, transparent 70%);
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s ease, opacity 0.3s ease;
        }

        .ripple-effect:active::after {
            transform: scale(1);
            opacity: 1;
        }

    .hide-hamburger #open-mobile-menu {
      display: none !important;
    }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen hide-hamburger" style='font-family: "Be Vietnam Pro", "Noto Sans", sans-serif;'>

<!-- Main Content Area -->
<div class="flex flex-col min-h-screen main-content-mobile">
    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Main content -->
    <main class="flex-1 mobile-spacing sm:px-6 sm:py-6 max-w-6xl w-full">
        <div layout:fragment="content"></div>
    </main>

    <!-- Mobile Navigation -->
    <div th:replace="~{fragments/mobile-nav :: mobile-nav}"></div>

    <!-- Support Chat -->
    <div th:replace="~{fragments/chat :: chat}"></div>
</div>

<!-- Scripts -->
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
