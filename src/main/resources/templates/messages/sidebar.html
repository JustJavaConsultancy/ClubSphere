<div class="chat-sidebar border-r border-gray-200 flex flex-col">
    <div class="p-4 border-b border-gray-200">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-900">Messages</h2>
            <button class="p-2 rounded-full hover:bg-gray-100 transition-colors" id="startChatButton">
                <span class="material-icons text-gray-600">add</span>
            </button>
        </div>
        <div class="search-container relative">
            <span class="search-icon material-icons absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">search</span>
            <input class="search-input w-full pl-10 pr-4 py-2 rounded-lg focus:outline-none transition-all" placeholder="Search chats..." type="text"/>
        </div>
    </div>
    
    <div class="no-conversations flex-1">
        <span class="no-conversations-icon material-icons">forum</span>
        <h3 class="text-xl font-medium mb-2 text-gray-700">No conversations yet</h3>
        <p class="text-gray-500 mb-4">Start a new conversation by clicking the + button above</p>
    </div>

    <div class="p-4 border-t border-gray-200">
        <button class="w-full flex items-center justify-center btn-primary py-2 px-4 rounded-lg transition-all text-sm md:text-base" id="createGroupButton">
            <span class="material-icons mr-2">group_add</span>
            <span class="hidden sm:inline">Create Group Chat</span>
            <span class="sm:hidden">New Group</span>
        </button>
    </div>
</div>
