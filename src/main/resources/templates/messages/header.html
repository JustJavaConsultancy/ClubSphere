<div class="chat-header flex items-center justify-between p-4 bg-white border-b border-gray-200" id="chatHeaderDefault">
    <div class="flex items-center">
        <button class="mobile-menu-button action-button mr-2" id="chatSidebarToggleDefault" aria-label="Toggle chat sidebar">
            <span class="material-icons">menu</span>
        </button>
        <div class="relative">
            <div class="w-10 h-10 rounded-full mr-4 bg-gray-100 flex items-center justify-center">
                <span class="material-icons text-gray-400">chat</span>
            </div>
        </div>
        <div>
            <h3 class="font-semibold text-gray-900 text-base">Select a message</h3>
        </div>
    </div>
</div>

<!-- User chat header (hidden by default) -->
<div class="chat-header flex items-center justify-between p-4 bg-white border-b border-gray-200 hidden" id="chatHeaderUser">
    <div class="flex items-center">
        <button class="mobile-menu-button action-button mr-2" id="chatSidebarToggleUser" aria-label="Toggle chat sidebar">
            <span class="material-icons">menu</span>
        </button>
        <div class="relative">
            <div id="userAvatarContainer" class="user-avatar">
                <!-- Initials will be placed here -->
            </div>
            <span class="online-indicator hidden" id="userOnlineStatus"></span>
        </div>
        <div>
            <h3 class="font-semibold text-gray-900 text-base" id="userChatName">User Name</h3>
            <p class="text-sm text-gray-500" id="userChatStatus">Offline</p>
        </div>
    </div>
    <div class="flex items-center space-x-2">
        <!-- Video Call Dropdown -->
        <div class="relative" id="videoCallDropdownUser">
            <button id="video-call-dropdown-btn-user" class="action-button">
                <span class="material-icons">videocam</span>
            </button>
            <div id="video-call-dropdown-menu-user" class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg z-50">
                <button id="start-video-call-user" class="w-full text-left px-4 py-2 hover:bg-gray-50 text-gray-700 flex items-center">
                    <span class="material-icons mr-2">play_circle</span> Start Video Call
                </button>
                <button id="copy-meeting-link-user" class="w-full text-left px-4 py-2 hover:bg-gray-50 text-gray-700 flex items-center">
                    <span class="material-icons mr-2">link</span> Copy Meeting Link
                </button>
            </div>
        </div>
        <!-- End Video Call Dropdown -->
        <button class="action-button">
            <span class="material-icons">call</span>
        </button>
        <button class="action-button">
            <span class="material-icons">more_vert</span>
        </button>
    </div>
</div>

<!-- Group chat header (hidden by default) -->
<div class="chat-header flex items-center justify-between p-4 bg-white border-b border-gray-200 hidden" id="chatHeaderGroup">
    <div class="flex items-center">
        <button class="mobile-menu-button action-button mr-2" id="chatSidebarToggleGroup" aria-label="Toggle chat sidebar">
            <span class="material-icons">menu</span>
        </button>
        <div class="relative">
            <div class="group-name-avatar" id="groupNameAvatar">
                <!-- Group name initials will be placed here -->
            </div>
        </div>
        <div>
            <h3 class="font-semibold text-gray-900 text-base" id="groupChatName">Group Name</h3>
            <p class="text-sm text-gray-500" id="groupMembersCount">3 members</p>
        </div>
    </div>
    <div class="flex items-center space-x-2">
        <!-- Video Call Dropdown -->
        <div class="relative" id="videoCallDropdownGroup">
            <button id="video-call-dropdown-btn-group" class="action-button">
                <span class="material-icons">videocam</span>
            </button>
            <div id="video-call-dropdown-menu-group" class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg z-50">
                <button id="start-video-call-group" class="w-full text-left px-4 py-2 hover:bg-gray-50 text-gray-700 flex items-center">
                    <span class="material-icons mr-2">play_circle</span> Start Video Call
                </button>
                <button id="copy-meeting-link-group" class="w-full text-left px-4 py-2 hover:bg-gray-50 text-gray-700 flex items-center">
                    <span class="material-icons mr-2">link</span> Copy Meeting Link
                </button>
            </div>
        </div>
        <!-- End Video Call Dropdown -->
        <button class="action-button">
            <span class="material-icons">call</span>
        </button>
        <button class="action-button">
            <span class="material-icons">more_vert</span>
        </button>
    </div>
</div>
