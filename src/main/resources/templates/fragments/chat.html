<div th:fragment="chat" xmlns:th="http://www.thymeleaf.org">
    <!-- Support Chat Button -->
    <button id="support-chat-btn" class="fixed bottom-24 right-4 lg:bottom-6 lg:right-6 w-12 h-12 md:w-16 md:h-16 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg flex items-center justify-center transition-all duration-300 z-40 hover:scale-110 touch-target">
        <span class="material-icons text-lg md:text-2xl">headset_mic</span>
    </button>

    <!-- Chat Box -->
    <div id="chat-box" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-120 h-196 bg-slate-800 border border-slate-700 rounded-lg shadow-xl z-60 hidden flex-col" style="background-color: rgb(30, 41, 59);">
        <!-- Chat Header -->
        <header id="chat-header" class="flex items-center justify-between p-3 md:p-4 border-b border-slate-700 bg-slate-900 rounded-t-lg cursor-move" style="background-color: white;">
            <div class="flex items-center space-x-2">
                <span class="material-icons text-blue-700">support_agent</span>
                <h3 class="text-gray-700 font-semibold">Support Chat</h3>
                <div class="w-2 h-2 bg-green-500 rounded-full ml-2"></div>
            </div>
            <button id="close-chat-btn" class="text-slate-400 hover:text-white transition-colors touch-target">
                <span class="material-icons">close</span>
            </button>
        </header>

        <!-- Chat Messages -->
        <div id="chat-messages" class="flex-1 p-3 md:p-4 overflow-y-auto space-y-3 bg-white">
            <div class="flex items-start space-x-3 animate-fade-in">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center flex-shrink-0">
                    <span class="material-icons text-white text-sm">support_agent</span>
                </div>
                <div class="message-bubble-bot p-3 rounded-lg rounded-tl-none max-w-xs">
                    <p class="text-sm text-gray-700">Hello! I'm here to help you with any Community related question. How can I assist you today?</p>
                    <span class="text-xs text-gray-500 mt-1 block">Just now</span>
                </div>
            </div>
        </div>

        <!-- Chat Input -->
        <footer class="p-3 md:p-4 border-t border-gray-200 bg-white shadow-sm rounded-b-lg">
            <div class="flex space-x-2">
                <input
                        id="chat-input"
                        type="text"
                        placeholder="Type your message..."
                        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 md:px-4 md:py-3 text-sm md:text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-gray-400 chat-input-mobile"
                />
                <button
                        id="send-message-btn"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 md:px-4 md:py-3 rounded-lg shadow-sm transition-transform transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed touch-target"
                >
                    <span class="material-icons text-base md:text-lg">send</span>
                </button>
            </div>
            <div class="flex items-center mt-2 text-xs text-gray-500">
                <span class="material-icons text-xs mr-1">info</span>
                <span class="hidden sm:inline">Press Enter to send</span>
                <span class="sm:hidden">Tap to send</span>
            </div>
        </footer>
    </div>
</div>
