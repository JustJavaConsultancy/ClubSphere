<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Single group row fragment -->
<tr th:fragment="group-row" class="border-b border-gray-100 hover:bg-gray-50 group-row" th:id="'group-row-' + ${group.id}">
  <td class="py-3 px-4">
    <div class="font-medium text-gray-800" th:text="${group != null && group.groupName != null ? group.groupName : 'Unknown Group'}">Frontend Developers</div>
  </td>
  <td class="py-3 px-4">
    <div class="text-gray-600 text-sm" th:text="${group != null && group.groupDescription != null ? group.groupDescription : 'No description'}">A group for frontend developers</div>
  </td>
  <td class="py-3 px-4">
        <span class="members-badge">
            <svg class="members-icon" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
            </svg>
            <span th:text="${group != null && group.memberCount != null ? group.memberCount + ' members' : '0 members'}">45 members</span>
        </span>
  </td>
  <td class="py-3 px-4">
    <div class="relative">
      <button th:attr="data-group-id=${group != null && group.id != null ? group.id : 'unknown'}" onclick="toggleDropdown(this.getAttribute('data-group-id'))" class="p-2 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
        </svg>
      </button>
      <div th:id="'dropdown-' + ${group != null && group.id != null ? group.id : 'unknown'}" class="dropdown-menu">
        <div th:attr="data-group-id=${group != null && group.id != null ? group.id : 'unknown'}" onclick="editGroup(this.getAttribute('data-group-id'))" class="dropdown-item text-blue-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
          Edit
        </div>
        <div th:attr="data-group-id=${group != null && group.id != null ? group.id : 'unknown'},data-group-name=${group != null && group.groupName != null ? group.groupName : 'Unknown Group'}" onclick="deleteGroup(this.getAttribute('data-group-id'), this.getAttribute('data-group-name'))" class="dropdown-item text-red-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          Delete
        </div>
      </div>
    </div>
  </td>
</tr>

<!-- Empty state fragment -->
<tr th:fragment="empty">
  <td colspan="4" class="py-8 text-center text-gray-500">
    <div class="flex flex-col items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
      </svg>
      <p>No groups found. Create your first group to get started!</p>
    </div>
  </td>
</tr>

</body>
</html>
