<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Groups list container fragment -->
<div th:fragment="groups-list">
    <div th:if="${#lists.isEmpty(groups)}" class="mobile-empty-state">
        <svg class="mobile-empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #374151;">No groups yet</h3>
        <p style="margin-bottom: 20px;">Create your first group to get started!</p>
        <button onclick="openAddGroupModal()" class="mobile-button" style="max-width: 200px; margin: 0 auto;">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Create Group
        </button>
    </div>

    <div th:each="group : ${groups}" class="mobile-group-card" th:id="'group-card-' + ${group.id}">
        <div class="mobile-group-header">
            <div style="flex: 1;">
                <h3 class="mobile-group-title" th:text="${group != null && group.groupName != null ? group.groupName : 'Unknown Group'}">Frontend Developers</h3>
                <p class="mobile-group-description" th:text="${group != null && group.groupDescription != null ? group.groupDescription : 'No description'}">A group for frontend developers</p>
            </div>
            <div class="mobile-dropdown">
                <button class="mobile-action-button" th:attr="data-group-id=${group != null && group.id != null ? group.id : 'unknown'}" onclick="toggleMobileDropdown(this.getAttribute('data-group-id'))">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/>
                    </svg>
                </button>
                <div th:id="'mobile-dropdown-' + ${group != null && group.id != null ? group.id : 'unknown'}" class="mobile-dropdown-menu">
                    <div th:attr="data-group-id=${group != null && group.id != null ? group.id : 'unknown'}" onclick="editGroup(this.getAttribute('data-group-id'))" class="mobile-dropdown-item primary">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        Edit Group
                    </div>
                    <div th:attr="data-group-id=${group != null && group.id != null ? group.id : 'unknown'},data-group-name=${group != null && group.groupName != null ? group.groupName : 'Unknown Group'}" onclick="deleteGroup(this.getAttribute('data-group-id'), this.getAttribute('data-group-name'))" class="mobile-dropdown-item danger">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                        Delete Group
                    </div>
                </div>
            </div>
        </div>
        <div class="mobile-group-meta">
            <div class="mobile-members-badge">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
                </svg>
                <span th:text="${group != null && group.memberCount != null ? group.memberCount + ' members' : '0 members'}">45 members</span>
            </div>
        </div>
        <!-- Enter Group Button -->
        <a th:href="@{/mobile/group(id=${group.id})}" style="display:block;margin-top:12px;padding:10px 16px;background:linear-gradient(135deg,#2A2494,#3730a3);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;text-align:center;text-decoration:none;box-shadow:0 4px 12px rgba(42,36,148,0.3);transition:all 0.2s ease;">
            <svg style="width:16px;height:16px;vertical-align:middle;margin-right:6px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Enter Group
        </a>
    </div>
</div>

<!-- Empty state fragment -->
<div th:fragment="empty-state" class="mobile-empty-state">
    <svg class="mobile-empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
    </svg>
    <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #374151;">No groups yet</h3>
    <p style="margin-bottom: 20px;">Create your first group to get started!</p>
    <button onclick="openAddGroupModal()" class="mobile-button" style="max-width: 200px; margin: 0 auto;">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Create Group
    </button>
</div>

</body>
</html>
