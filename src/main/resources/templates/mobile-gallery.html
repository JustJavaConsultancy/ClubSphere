<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile-layout}">
<head>
    <title>Gallery - Connect Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<main layout:fragment="content" class="mobile-gallery">
    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success">
        <div class="alert-content">
            <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            <span th:text="${success}"></span>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <div class="alert-content">
            <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span th:text="${error}"></span>
        </div>
    </div>

    <!-- Header Section -->
    <header class="page-header">
        <div class="header-content">
            <h1 class="page-title">Gallery</h1>
            <p class="page-subtitle">Manage your files and media</p>
        </div>
        <a th:href="@{/mobile/gallery/add}" class="fab-button">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </a>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <div class="search-container">
            <div class="search-input-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search files..." class="search-input">
            </div>
        </div>
    </section>

    <!-- Filter Tabs -->
    <nav class="filter-tabs">
        <div class="tabs-container">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="documents">Docs</button>
            <button class="filter-tab" data-filter="images">Images</button>
            <button class="filter-tab" data-filter="videos">Videos</button>
            <button class="filter-tab" data-filter="audio">Audio</button>
        </div>
    </nav>

    <!-- Files Grid -->
    <section class="files-section">
        <div id="filesGrid" class="files-grid">
            <article th:each="file : ${files}" class="file-card" th:attr="data-type=${file.type}, data-name=${file.displayName}, data-file-id=${file.id}">
                <div class="file-icon-container">
                    <div class="file-icon"
                         th:classappend="${file.type == 'images'} ? 'icon-image' : (${file.type == 'documents'} ? 'icon-document' : (${file.type == 'videos'} ? 'icon-video' : (${file.type == 'audio'} ? 'icon-audio' : 'icon-default')))">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                             th:if="${file.type == 'images'}">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                             th:if="${file.type == 'documents'}">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                             th:if="${file.type == 'videos'}">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                             th:if="${file.type == 'audio'}">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                             th:unless="${file.type == 'images' or file.type == 'documents' or file.type == 'videos' or file.type == 'audio'}">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                </div>

                <div class="file-info">
                    <h3 class="file-name" th:text="${file.displayName}">document.pdf</h3>
                    <div class="file-meta">
                        <span class="file-type-badge"
                              th:classappend="${file.type == 'images'} ? 'badge-image' : (${file.type == 'documents'} ? 'badge-document' : (${file.type == 'videos'} ? 'badge-video' : (${file.type == 'audio'} ? 'badge-audio' : 'badge-default')))"
                              th:text="${#strings.capitalize(file.type)}">Document</span>
                        <span class="file-size" th:text="${file.size}">2.4 MB</span>
                    </div>
                    <time class="file-date" th:text="${file.dateAdded}">Dec 15, 2023</time>
                </div>

                <div class="file-actions">
                    <button class="action-button download-btn"
                            th:data-file-id="${file.id}"
                            onclick="downloadFile(this.dataset.fileId)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-4-4m4 4l4-4m5-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </button>
                    <button class="action-button delete-btn"
                            th:data-file-id="${file.id}"
                            th:data-file-name="${file.displayName}"
                            onclick="deleteFile(this.dataset.fileId, this.dataset.fileName)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </article>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
            </div>
            <h3 class="empty-title">No files found</h3>
            <p class="empty-description">Get started by uploading a new file.</p>
            <a th:href="@{/mobile/gallery/add}" class="empty-action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Add File
            </a>
        </div>
    </section>

    <style>
        .mobile-gallery {
            padding: 0;
            background: #f8fafc;
            min-height: 100vh;
        }

        .alert {
            margin: 16px;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .alert-success {
            background: #d1fae5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }

        .alert-error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
        }

        .alert-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .page-header {
            background: linear-gradient(135deg, #2A2494, #3730a3);
            color: white;
            padding: 24px 16px 32px;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.1"/><circle cx="50" cy="10" r="0.5" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
            font-weight: 400;
        }

        .fab-button {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 56px;
            height: 56px;
            background: #2A2494;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(42, 36, 148, 0.4);
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .fab-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(42, 36, 148, 0.5);
        }

        .fab-button svg {
            width: 24px;
            height: 24px;
        }

        .search-section {
            padding: 24px 16px 16px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .search-input-wrapper {
            position: relative;
            max-width: 400px;
            margin: 0 auto;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #9ca3af;
        }

        .search-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            background: #f9fafb;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #2A2494;
            background: white;
            box-shadow: 0 0 0 3px rgba(42, 36, 148, 0.1);
        }

        .filter-tabs {
            background: white;
            padding: 0 16px;
            border-bottom: 1px solid #e5e7eb;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tabs-container {
            display: flex;
            gap: 8px;
            min-width: max-content;
            padding: 16px 0;
        }

        .filter-tab {
            padding: 12px 20px;
            border: none;
            background: #f3f4f6;
            color: #6b7280;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .filter-tab.active {
            background: #2A2494;
            color: white;
            box-shadow: 0 2px 8px rgba(42, 36, 148, 0.3);
        }

        .filter-tab:hover:not(.active) {
            background: #e5e7eb;
            color: #374151;
        }

        .files-section {
            padding: 16px;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        @media (max-width: 640px) {
            .files-grid {
                grid-template-columns: 1fr;
            }
        }

        .file-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
        }

        .file-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .file-icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .file-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-icon svg {
            width: 24px;
            height: 24px;
        }

        .icon-image {
            background: #dcfce7;
            color: #16a34a;
        }

        .icon-document {
            background: #ede9fe;
            color: #2A2494;
        }

        .icon-video {
            background: #f3e8ff;
            color: #9333ea;
        }

        .icon-audio {
            background: #fef3c7;
            color: #d97706;
        }

        .icon-default {
            background: #f1f5f9;
            color: #64748b;
        }

        .file-info {
            text-align: center;
            margin-bottom: 16px;
        }

        .file-name {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin: 0 0 8px 0;
            line-height: 1.4;
            word-break: break-word;
        }

        .file-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .file-type-badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-image {
            background: #dcfce7;
            color: #16a34a;
        }

        .badge-document {
            background: #ede9fe;
            color: #2A2494;
        }

        .badge-video {
            background: #f3e8ff;
            color: #9333ea;
        }

        .badge-audio {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-default {
            background: #f1f5f9;
            color: #64748b;
        }

        .file-size {
            font-size: 12px;
            color: #6b7280;
            font-weight: 500;
        }

        .file-date {
            font-size: 12px;
            color: #9ca3af;
            display: block;
        }

        .file-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .action-button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-button svg {
            width: 20px;
            height: 20px;
        }

        .download-btn {
            background: #ede9fe;
            color: #2A2494;
        }

        .download-btn:hover {
            background: #2A2494;
            color: white;
            transform: scale(1.1);
        }

        .delete-btn {
            background: #fee2e2;
            color: #dc2626;
        }

        .delete-btn:hover {
            background: #dc2626;
            color: white;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            background: white;
            border-radius: 16px;
            margin: 24px 0;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            color: #9ca3af;
        }

        .empty-icon svg {
            width: 100%;
            height: 100%;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin: 0 0 8px 0;
        }

        .empty-description {
            font-size: 16px;
            color: #6b7280;
            margin: 0 0 24px 0;
        }

        .empty-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #2A2494;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .empty-action-btn:hover {
            background: #3730a3;
            transform: translateY(-1px);
        }

        .empty-action-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Loading and Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .modal-header svg {
            width: 24px;
            height: 24px;
            color: #dc2626;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin: 0;
        }

        .modal-body {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-button-cancel {
            background: #f3f4f6;
            color: #374151;
        }

        .modal-button-cancel:hover {
            background: #e5e7eb;
        }

        .modal-button-confirm {
            background: #dc2626;
            color: white;
        }

        .modal-button-confirm:hover {
            background: #b91c1c;
        }

        .notification {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 16px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1001;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: #10b981;
        }

        .notification.error {
            background: #ef4444;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #2A2494;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const filterTabs = document.querySelectorAll('.filter-tab');
            const fileCards = document.querySelectorAll('.file-card');
            const searchInput = document.getElementById('searchInput');
            const emptyState = document.getElementById('emptyState');
            const filesGrid = document.getElementById('filesGrid');

            function updateActiveTab(activeTab) {
                filterTabs.forEach(tab => {
                    tab.classList.remove('active');
                });
                activeTab.classList.add('active');
            }

            function filterFiles() {
                const activeFilter = document.querySelector('.filter-tab.active').dataset.filter;
                const searchTerm = searchInput.value.toLowerCase();
                let visibleCount = 0;

                const currentFileCards = document.querySelectorAll('.file-card');

                currentFileCards.forEach((card) => {
                    const fileType = card.dataset.type;
                    const fileName = card.dataset.name ? card.dataset.name.toLowerCase() : '';

                    const matchesFilter = activeFilter === 'all' || fileType === activeFilter;
                    const matchesSearch = searchTerm === '' || fileName.includes(searchTerm);

                    if (matchesFilter && matchesSearch) {
                        card.style.display = '';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                if (visibleCount === 0) {
                    emptyState.style.display = 'block';
                    filesGrid.style.display = 'none';
                } else {
                    emptyState.style.display = 'none';
                    filesGrid.style.display = 'grid';
                }
            }

            filterTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    updateActiveTab(this);
                    setTimeout(() => {
                        filterFiles();
                    }, 10);
                });
            });

            searchInput.addEventListener('input', function() {
                filterFiles();
            });

            setTimeout(() => {
                const hasFiles = document.querySelectorAll('.file-card').length > 0;
                if (!hasFiles) {
                    emptyState.style.display = 'block';
                    filesGrid.style.display = 'none';
                } else {
                    filterFiles();
                }
            }, 100);
        });

        function downloadFile(fileId) {
            showNotification('Starting download...', 'success');
            window.location.href = `/mobile/gallery/download/${fileId}`;
        }

        function deleteFile(fileId, fileName) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
                        </svg>
                        <h3 class="modal-title">Delete File</h3>
                    </div>
                    <div class="modal-body">
                        Are you sure you want to delete "${fileName}"? This action cannot be undone.
                    </div>
                    <div class="modal-actions">
                        <button class="modal-button modal-button-cancel" onclick="closeModal()">Cancel</button>
                        <button class="modal-button modal-button-confirm" onclick="confirmDelete('${fileId}')">Delete</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            window.currentModal = modal;

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
        }

        function closeModal() {
            if (window.currentModal) {
                document.body.removeChild(window.currentModal);
                window.currentModal = null;
            }
        }

        function confirmDelete(fileId) {
            closeModal();

            const loadingModal = document.createElement('div');
            loadingModal.className = 'modal-overlay';
            loadingModal.innerHTML = `
                <div class="modal-content" style="text-align: center;">
                    <div class="loading-spinner" style="margin: 0 auto 16px;"></div>
                    <div>Deleting file...</div>
                </div>
            `;
            document.body.appendChild(loadingModal);

            fetch(`/mobile/gallery/delete/${fileId}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => {
                document.body.removeChild(loadingModal);
                if (response.ok) {
                    const card = document.querySelector(`[data-file-id="${fileId}"]`);
                    if (card) {
                        card.remove();
                    }

                    const remainingCards = document.querySelectorAll('.file-card');
                    if (remainingCards.length === 0) {
                        document.getElementById('emptyState').style.display = 'block';
                        document.getElementById('filesGrid').style.display = 'none';
                    }

                    showNotification('File deleted successfully', 'success');
                } else {
                    response.text().then(errorText => {
                        showNotification('Error deleting file: ' + errorText, 'error');
                    });
                }
            })
            .catch(error => {
                document.body.removeChild(loadingModal);
                console.error('Error:', error);
                showNotification('Error deleting file. Please try again.', 'error');
            });
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.classList.add('show');
            }, 100);

            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (document.body.contains(notification)) {
                        document.body.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }
    </script>
</main>
</body>
</html>
