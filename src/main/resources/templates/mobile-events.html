<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile-layout}">
<head>
    <meta charset="UTF-8">
    <title>Events</title>
    <style>
        .ev-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f3f4f6;
        }
        .ev-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 9999px;
            background: #eff6ff;
            color: #2563eb;
        }
        .ev-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .ev-input:focus { border-color: #6366f1; }
        .ev-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div style="margin-bottom:20px;">
        <h1 style="font-size:1.4rem;font-weight:700;color:#1f2937;margin:0 0 4px 0;">Events</h1>
        <p style="font-size:13px;color:#6b7280;margin:0;">Create and manage club events</p>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" style="background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:14px;">
        ✓ <span th:text="${successMessage}"></span>
    </div>

    <!-- Create Event Form (admins only) -->
    <div th:if="${canCreate}" class="ev-card" style="margin-bottom:24px;">
        <h2 style="font-size:16px;font-weight:700;color:#1f2937;margin:0 0 16px 0;">
            🎉 Create New Event
        </h2>
        <form th:action="@{/mobile/events/create}" method="post">
            <div style="margin-bottom:14px;">
                <label class="ev-label">Event Name <span style="color:#ef4444;">*</span></label>
                <input type="text" name="title" class="ev-input" placeholder="Enter event name" required>
            </div>
            <div style="margin-bottom:14px;">
                <label class="ev-label">Description <span style="color:#ef4444;">*</span></label>
                <textarea name="description" rows="3" class="ev-input" placeholder="Describe the event..." required style="resize:vertical;"></textarea>
            </div>
            <div style="margin-bottom:14px;">
                <label class="ev-label">Community <span style="color:#ef4444;">*</span></label>
                <select name="communityId" class="ev-input" required>
                    <option value="" disabled selected>— Select a community —</option>
                    <option th:each="c : ${communities}"
                            th:value="${c.id}"
                            th:text="${c.name}"
                            th:selected="${selectedCommunityId != null and c.id == selectedCommunityId}"></option>
                </select>
                <p th:if="${communities == null or #lists.isEmpty(communities)}"
                   style="margin-top:6px;font-size:12px;color:#ef4444;">
                    You are not an admin of any community.
                </p>
            </div>
            <div style="margin-bottom:14px;">
                <label class="ev-label">Event Date <span style="color:#ef4444;">*</span></label>
                <input type="date" name="startDate" class="ev-input" required>
            </div>
            <button type="submit"
                    th:disabled="${communities == null or #lists.isEmpty(communities)}"
                    style="width:100%;padding:14px;background:linear-gradient(135deg,#4f46e5,#6366f1);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">
                Create Event
            </button>
        </form>
    </div>

    <!-- Events List -->
    <h2 style="font-size:15px;font-weight:700;color:#374151;margin:0 0 12px 0;">Existing Events</h2>

    <div th:if="${events == null or #lists.isEmpty(events)}"
         style="text-align:center;padding:40px 20px;background:white;border-radius:16px;border:2px dashed #e5e7eb;">
        <div style="font-size:3rem;margin-bottom:12px;">📅</div>
        <h3 style="font-size:16px;font-weight:600;color:#374151;margin:0 0 6px 0;">No events yet</h3>
        <p style="font-size:13px;color:#6b7280;margin:0;">Create the first club event above.</p>
    </div>

    <div th:unless="${events == null or #lists.isEmpty(events)}">
        <div th:each="event : ${events}" class="ev-card"
             style="cursor:pointer;"
             th:data-event-id="${event.id}"
             th:data-event-title="${event.title != null ? event.title : (event.description != null ? event.description : '')}"
             th:data-event-desc="${event.description != null ? event.description : ''}"
             th:data-event-date="${event.startDate != null ? event.startDate : ''}"
             onclick="handleEvtCardClick(this)">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                <h3 style="font-size:15px;font-weight:600;color:#1f2937;margin:0;flex:1;"
                    th:text="${event.title != null ? event.title : event.description}">Event</h3>
                <span class="ev-badge" style="margin-left:8px;">Event</span>
            </div>
            <p th:if="${event.description != null}" style="font-size:13px;color:#6b7280;margin:0 0 8px 0;" th:text="${event.description}"></p>
            <div style="display:flex;gap:12px;font-size:12px;color:#9ca3af;flex-wrap:wrap;align-items:center;">
                <span th:if="${event.startDate != null}">📅 <span th:text="${event.startDate}"></span></span>
                <span style="margin-left:auto;color:#16a34a;font-weight:600;">
                    ❤️ ₦<span th:text="${donationTotals != null and donationTotals[event.id] != null ? #numbers.formatDecimal(donationTotals[event.id], 1, 'COMMA', 0, 'POINT') : '0'}"></span> raised
                </span>
            </div>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div id="evtModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:flex-end;"
         onclick="if(event.target===this) closeEventModal()">
        <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:24px 20px 32px;">
            <div style="width:40px;height:4px;background:#d1d5db;border-radius:4px;margin:0 auto 16px;"></div>
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                <h3 id="evtModalTitle" style="font-size:18px;font-weight:700;color:#1f2937;margin:0;flex:1;"></h3>
                <button onclick="closeEventModal()" style="background:none;border:none;padding:4px;cursor:pointer;margin-left:8px;">
                    <svg style="width:20px;height:20px;" fill="none" viewBox="0 0 24 24" stroke="#9ca3af">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <p id="evtModalDate" style="font-size:13px;color:#6b7280;margin:0 0 8px 0;"></p>
            <p id="evtModalDesc" style="font-size:14px;color:#374151;margin:0 0 16px 0;line-height:1.5;"></p>
            <div style="border-top:1px solid #f3f4f6;padding-top:14px;">
                <h4 style="font-size:14px;font-weight:600;color:#374151;margin:0 0 10px 0;">💝 Donations</h4>
                <div id="evtModalDonations" style="font-size:13px;color:#6b7280;">Loading...</div>
                <div id="evtModalTotal" style="margin-top:10px;font-size:15px;font-weight:700;color:#16a34a;"></div>
            </div>
        </div>
    </div>

    <script>
        function handleEvtCardClick(el) {
            openEventModal(el.dataset.eventId, el.dataset.eventTitle, el.dataset.eventDesc, el.dataset.eventDate);
        }
        function openEventModal(eventId, title, description, date) {
            var modal = document.getElementById('evtModal');
            document.getElementById('evtModalTitle').textContent = title || '';
            document.getElementById('evtModalDesc').textContent = description || '';
            document.getElementById('evtModalDate').textContent = date ? '📅 ' + date : '';
            document.getElementById('evtModalDonations').textContent = 'Loading...';
            document.getElementById('evtModalTotal').textContent = '';
            if (modal) { modal.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
            fetch('/events/api/donations/' + eventId)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var list = document.getElementById('evtModalDonations');
                    var totalEl = document.getElementById('evtModalTotal');
                    if (!data || data.length === 0) {
                        list.textContent = 'No donations yet.';
                        return;
                    }
                    var total = 0;
                    list.innerHTML = data.map(function(d) {
                        total += parseFloat(d.amount) || 0;
                        return '<div style="padding:8px 0;border-bottom:1px solid #f3f4f6;">' +
                            '<span style="font-weight:600;color:#1f2937;">' + (d.firstName||'') + ' ' + (d.lastName||'') + '</span>' +
                            '<span style="float:right;color:#ec4899;font-weight:700;">₦' + parseFloat(d.amount).toLocaleString() + '</span>' +
                            (d.message ? '<p style="font-size:12px;color:#6b7280;margin:4px 0 0 0;">' + d.message + '</p>' : '') +
                            '</div>';
                    }).join('');
                    totalEl.textContent = '❤️ Total raised: ₦' + total.toLocaleString();
                })
                .catch(function() {
                    document.getElementById('evtModalDonations').textContent = 'Could not load donations.';
                });
        }
        function closeEventModal() {
            var modal = document.getElementById('evtModal');
            if (modal) { modal.style.display = 'none'; document.body.style.overflow = ''; }
        }
    </script>

</div>
</body>
</html>
