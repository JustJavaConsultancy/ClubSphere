<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Gallery - Clubknit</title>
</head>
<body>
<main layout:fragment="content">
    <div class="space-y-6">
        <!-- Flash Messages -->
        <div th:if="${success}" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">
            <div class="flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                <span th:text="${success}"></span>
            </div>
        </div>

        <div th:if="${error}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
            <div class="flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span th:text="${error}"></span>
            </div>
        </div>

        <!-- Page Header -->
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 gradient-text">Gallery</h1>
                <p class="text-gray-600 mt-1">Manage your files and media</p>
            </div>
            <div class="flex flex-col sm:flex-row gap-3">
                <!-- Search Box -->
                <div class="relative">
                    <input
                            type="text"
                            id="searchInput"
                            placeholder="Search files..."
                            class="w-full sm:w-64 pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    />
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <!-- Add File Button -->
                <a th:href="@{/gallery/add}" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors btn-transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Add File
                </a>
            </div>
        </header>

        <!-- Filter Navigation -->
        <nav class="border-b border-gray-200">
            <div class="flex space-x-8 overflow-x-auto">
                <button class="filter-tab py-2 px-1 border-b-2 font-medium text-sm whitespace-nowrap tab-transition border-blue-500 text-blue-600" data-filter="all">
                    All Files
                </button>
                <button class="filter-tab py-2 px-1 border-b-2 font-medium text-sm whitespace-nowrap tab-transition border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300" data-filter="documents">
                    Documents
                </button>
                <button class="filter-tab py-2 px-1 border-b-2 font-medium text-sm whitespace-nowrap tab-transition border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300" data-filter="images">
                    Images
                </button>
                <button class="filter-tab py-2 px-1 border-b-2 font-medium text-sm whitespace-nowrap tab-transition border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300" data-filter="videos">
                    Videos
                </button>
                <button class="filter-tab py-2 px-1 border-b-2 font-medium text-sm whitespace-nowrap tab-transition border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300" data-filter="audio">
                    Audio
                </button>
            </div>
        </nav>

        <!-- Files Table -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Name
                        </th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Type
                        </th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Size
                        </th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Date Added
                        </th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Actions
                        </th>
                    </tr>
                    </thead>
                    <tbody id="filesTableBody" class="bg-white divide-y divide-gray-200">
                    <tr th:each="file : ${files}" class="file-row hover:bg-gray-50" th:attr="data-type=${file.type}, data-name=${file.displayName}, data-file-id=${file.id}">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-8 w-8">
                                    <div class="h-8 w-8 rounded-lg flex items-center justify-center"
                                         th:classappend="${file.type == 'images'} ? 'bg-green-100 text-green-600' : (${file.type == 'documents'} ? 'bg-blue-100 text-blue-600' : (${file.type == 'videos'} ? 'bg-purple-100 text-purple-600' : (${file.type == 'audio'} ? 'bg-yellow-100 text-yellow-600' : 'bg-gray-100 text-gray-600')))">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                             th:if="${file.type == 'images'}">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                        </svg>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                             th:if="${file.type == 'documents'}">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                             th:if="${file.type == 'videos'}">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                        </svg>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                             th:if="${file.type == 'audio'}">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                                        </svg>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                             th:unless="${file.type == 'images' or file.type == 'documents' or file.type == 'videos' or file.type == 'audio'}">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                    </div>
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-medium text-gray-900" th:text="${file.displayName}">document.pdf</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                                <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full"
                                      th:classappend="${file.type == 'images'} ? 'bg-green-100 text-green-800' : (${file.type == 'documents'} ? 'bg-blue-100 text-blue-800' : (${file.type == 'videos'} ? 'bg-purple-100 text-purple-800' : (${file.type == 'audio'} ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800')))"
                                      th:text="${#strings.capitalize(file.type)}">Document</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${file.size}">2.4 MB</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${file.dateAdded}">Dec 15, 2023</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <div class="flex items-center space-x-3">
                                <a th:href="@{/gallery/download/{id}(id=${file.id})}"
                                   class="text-blue-600 hover:text-blue-900 btn-transition"
                                   title="Download">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-4-4m4 4l4-4m5-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                </a>
                                <button class="delete-file-btn text-red-600 hover:text-red-900 btn-transition"
                                        title="Delete"
                                        th:data-file-id="${file.id}"
                                        th:data-file-name="${file.displayName}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="text-center py-12" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">No files found</h3>
                <p class="mt-1 text-sm text-gray-500">Get started by uploading a new file.</p>
                <div class="mt-6">
                    <a th:href="@{/gallery/add}" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Add File
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Filter functionality
        document.addEventListener('DOMContentLoaded', function() {
            const filterTabs = document.querySelectorAll('.filter-tab');
            const fileRows = document.querySelectorAll('.file-row');
            const searchInput = document.getElementById('searchInput');
            const emptyState = document.getElementById('emptyState');
            const tableBody = document.getElementById('filesTableBody');

            function updateActiveTab(activeTab) {
                filterTabs.forEach(tab => {
                    tab.classList.remove('border-blue-500', 'text-blue-600');
                    tab.classList.add('border-transparent', 'text-gray-500');
                });
                activeTab.classList.remove('border-transparent', 'text-gray-500');
                activeTab.classList.add('border-blue-500', 'text-blue-600');
            }

            function filterFiles() {
                const activeFilter = document.querySelector('.filter-tab.border-blue-500').dataset.filter;
                const searchTerm = searchInput.value.toLowerCase();
                let visibleCount = 0;

                // Get fresh list of file rows each time
                const currentFileRows = document.querySelectorAll('.file-row');

                currentFileRows.forEach((row) => {
                    const fileType = row.dataset.type;
                    const fileName = row.dataset.name ? row.dataset.name.toLowerCase() : '';

                    const matchesFilter = activeFilter === 'all' || fileType === activeFilter;
                    const matchesSearch = searchTerm === '' || fileName.includes(searchTerm);

                    if (matchesFilter && matchesSearch) {
                        row.style.display = '';
                        visibleCount++;
                    } else {
                        row.style.display = 'none';
                    }
                });

                // Show/hide empty state
                const tableContainer = document.querySelector('table').parentElement;
                if (visibleCount === 0) {
                    emptyState.style.display = 'block';
                    tableContainer.style.display = 'none';
                } else {
                    emptyState.style.display = 'none';
                    tableContainer.style.display = '';
                }
            }

            // Filter tab click handlers
            filterTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    updateActiveTab(this);
                    // Small delay to ensure DOM updates
                    setTimeout(() => {
                        filterFiles();
                    }, 10);
                });
            });

            // Search input handler
            searchInput.addEventListener('input', function() {
                filterFiles();
            });

            // Initial filter - delay to ensure DOM is ready
            setTimeout(() => {
                // Check if we have any files to show initially
                const hasFiles = document.querySelectorAll('.file-row').length > 0;
                if (!hasFiles) {
                    emptyState.style.display = 'block';
                    document.querySelector('table').parentElement.style.display = 'none';
                } else {
                    filterFiles();
                }
            }, 100);
        });

        // Add event listeners for delete buttons
        document.addEventListener('click', function(e) {
            if (e.target.closest('.delete-file-btn')) {
                const button = e.target.closest('.delete-file-btn');
                const fileId = button.getAttribute('data-file-id');
                const fileName = button.getAttribute('data-file-name');
                deleteFile(fileId, fileName);
            }
        });

        // Delete file function
        function deleteFile(fileId, fileName) {
            // Create and show custom confirmation modal
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center';
            modal.innerHTML = `
                <div class="bg-white rounded-lg p-6 max-w-md mx-4">
                    <div class="flex items-center mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
                        </svg>
                        <h3 class="text-lg font-medium text-gray-900">Delete File</h3>
                    </div>
                    <p class="text-sm text-gray-500 mb-6">Are you sure you want to delete "${fileName}"? This action cannot be undone.</p>
                    <div class="flex justify-end space-x-3">
                        <button id="cancelDelete" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">Cancel</button>
                        <button id="confirmDelete" class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">Delete</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            // Handle cancel
            modal.querySelector('#cancelDelete').addEventListener('click', () => {
                document.body.removeChild(modal);
            });

            // Handle confirm
            modal.querySelector('#confirmDelete').addEventListener('click', () => {
                document.body.removeChild(modal);

                // Show loading state
                const loadingModal = document.createElement('div');
                loadingModal.className = 'fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center';
                loadingModal.innerHTML = `
                    <div class="bg-white rounded-lg p-6">
                        <div class="flex items-center">
                            <svg class="animate-spin h-5 w-5 text-blue-600 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span>Deleting file...</span>
                        </div>
                    </div>
                `;
                document.body.appendChild(loadingModal);

                fetch(`/gallery/delete/${fileId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => {
                    document.body.removeChild(loadingModal);
                    if (response.ok) {
                        // Remove the row from the table instead of reloading
                        const row = document.querySelector(`tr[data-file-id="${fileId}"]`);
                        if (row) {
                            row.remove();
                        }

                        // Check if we need to show empty state
                        const remainingRows = document.querySelectorAll('.file-row');
                        if (remainingRows.length === 0) {
                            document.getElementById('emptyState').style.display = 'block';
                            document.querySelector('table').parentElement.style.display = 'none';
                        }

                        // Show success message
                        showNotification('File deleted successfully', 'success');
                    } else {
                        response.text().then(errorText => {
                            showNotification('Error deleting file: ' + errorText, 'error');
                        });
                    }
                })
                .catch(error => {
                    document.body.removeChild(loadingModal);
                    console.error('Error:', error);
                    showNotification('Error deleting file. Please try again.', 'error');
                });
            });

            // Close modal on background click
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    document.body.removeChild(modal);
                }
            });
        }

        // Notification function
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 z-50 p-4 rounded-lg shadow-lg ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                if (document.body.contains(notification)) {
                    document.body.removeChild(notification);
                }
            }, 3000);
        }
    </script>
</main>
</body>
</html>
