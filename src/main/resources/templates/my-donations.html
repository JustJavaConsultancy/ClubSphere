<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations - Clubknit</title>
    <style>
        .donation-card { transition: box-shadow 0.15s ease; }
        .donation-card:hover { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04); }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-5xl mx-auto">
        <div th:if="${successMessage}" class="mb-4 rounded-lg bg-green-50 border border-green-200 text-green-700 px-4 py-3 text-sm font-medium" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="mb-4 rounded-lg bg-red-50 border border-red-200 text-red-700 px-4 py-3 text-sm font-medium" th:text="${errorMessage}"></div>
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mr-3 text-pink-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
                My Donations
            </h1>
            <p class="text-gray-500 mt-1">View your donation history across all clubs</p>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-pink-500">
                <p class="text-sm text-gray-500">Total Donations</p>
                <p class="text-2xl font-bold text-gray-800"
                   th:text="${donations != null ? #lists.size(donations) : 0}">0</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-green-500">
                <p class="text-sm text-gray-500">Total Amount</p>
                <p class="text-2xl font-bold text-gray-800"
                   th:text="${donations != null and !#lists.isEmpty(donations) ? '₦' + #aggregates.sum(donations.![amount]) : '₦0'}">₦0</p>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${donations == null or #lists.isEmpty(donations)}"
             class="bg-white rounded-xl shadow-sm p-12 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            <h3 class="text-lg font-semibold text-gray-600 mb-2">No Donations Yet</h3>
            <p class="text-gray-400">You haven't donated to any communities yet. Visit a club to make your first donation!</p>
        </div>

        <div id="donationActionFeedback" class="mb-4"></div>

        <!-- Donations List -->
        <div th:if="${donations != null and !#lists.isEmpty(donations)}" class="bg-white rounded-xl shadow-sm overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left font-semibold">Club</th>
                    <th class="px-4 py-3 text-left font-semibold">Event</th>
                    <th class="px-4 py-3 text-left font-semibold">Amount</th>
                    <th class="px-4 py-3 text-left font-semibold">Status</th>
                    <th class="px-4 py-3 text-left font-semibold">Date</th>
                    <th class="px-4 py-3 text-left font-semibold">Message</th>
                    <th class="px-4 py-3 text-left font-semibold">Action</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="don : ${donations}" class="hover:bg-gray-50 transition-colors">
                    <td class="px-4 py-3 font-semibold text-gray-800" th:text="${don['communityName'] != null ? don['communityName'] : 'Unknown Club'}">Club</td>
                    <td class="px-4 py-3 text-gray-600" th:text="${don['eventTitle'] != null ? don['eventTitle'] : 'Unknown Event'}">Event</td>
                    <td class="px-4 py-3 font-semibold text-pink-600"
                        th:text="${don['amount'] != null ? '₦' + #numbers.formatDecimal(don['amount'], 1, 2) : '₦0.00'}">₦100.00</td>
                    <td class="px-4 py-3">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold uppercase"
                              th:classappend="${don['status'] == 'PENDING'} ? ' bg-amber-100 text-amber-700' : ' bg-pink-100 text-pink-700'"
                              th:text="${don['status'] == 'PENDING'} ? 'Pledged' : 'Paid'">Paid</span>
                    </td>
                    <td class="px-4 py-3 text-gray-500"
                        th:text="${don['donatedAt'] != null ? #temporals.format(don['donatedAt'], 'MMM dd, yyyy HH:mm') : 'N/A'}">Jan 01, 2025</td>
                    <td class="px-4 py-3 text-gray-600" th:text="${don['message'] != null and !don['message'].isEmpty() ? don['message'] : '-'}">-</td>
                    <td class="px-4 py-3">
                        <button th:if="${don['status'] == 'PENDING'}"
                                type="button"
                                class="inline-flex items-center px-3 py-1.5 rounded-lg bg-pink-600 hover:bg-pink-700 text-white text-xs font-semibold transition-colors"
                                th:hx-post="@{/donation/fulfill/initiate(donationId=${don['donationId']})}"
                                hx-target="#donationActionFeedback"
                                hx-swap="innerHTML">
                            Pay Pledge
                        </button>
                        <span th:if="${don['status'] != 'PENDING'}" class="text-xs font-medium text-green-600">Completed</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
