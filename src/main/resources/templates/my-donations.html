<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations - Connect</title>
    <style>
        .donation-card { transition: box-shadow 0.15s ease; }
        .donation-card:hover { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04); }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-5xl mx-auto">
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mr-3 text-pink-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
                My Donations
            </h1>
            <p class="text-gray-500 mt-1">View your donation history across all communities</p>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-pink-500">
                <p class="text-sm text-gray-500">Total Donations</p>
                <p class="text-2xl font-bold text-gray-800"
                   th:text="${donations != null ? #lists.size(donations) : 0}">0</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-green-500">
                <p class="text-sm text-gray-500">Total Amount</p>
                <p class="text-2xl font-bold text-gray-800"
                   th:text="${donations != null and !#lists.isEmpty(donations) ? '₦' + #aggregates.sum(donations.![amount]) : '₦0'}">₦0</p>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${donations == null or #lists.isEmpty(donations)}"
             class="bg-white rounded-xl shadow-sm p-12 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            <h3 class="text-lg font-semibold text-gray-600 mb-2">No Donations Yet</h3>
            <p class="text-gray-400">You haven't donated to any communities yet. Visit a community to make your first donation!</p>
        </div>

        <!-- Donations List -->
        <div th:if="${donations != null and !#lists.isEmpty(donations)}" class="space-y-4">
            <div th:each="don : ${donations}" class="bg-white rounded-xl shadow-sm overflow-hidden donation-card">
                <div class="p-6">
                    <div class="flex flex-wrap items-start justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-lg font-bold text-gray-800"
                                    th:text="${don['communityName'] != null ? don['communityName'] : 'Unknown Community'}">Community Name</h3>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold uppercase bg-pink-100 text-pink-700">
                                    Donation
                                </span>
                            </div>
                            <div class="flex flex-wrap gap-6 text-sm text-gray-500">
                                <span class="flex items-center gap-1">
                                    <svg class="h-4 w-4 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    <span th:text="${don['donatedAt'] != null ? #temporals.format(don['donatedAt'], 'MMM dd, yyyy HH:mm') : 'N/A'}">Jan 01, 2025</span>
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    <span th:text="${don['eventTitle'] != null ? don['eventTitle'] : 'Unknown Event'}">Event Title</span>
                                </span>
                            </div>
                            <div th:if="${don['message'] != null and !don['message'].isEmpty()}" class="mt-3">
                                <p class="text-sm text-gray-600 italic">"<span th:text="${don['message']}">message</span>"</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-bold text-pink-600"
                               th:text="${don['amount'] != null ? '₦' + #numbers.formatDecimal(don['amount'], 1, 2) : '₦0.00'}">₦100.00</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
