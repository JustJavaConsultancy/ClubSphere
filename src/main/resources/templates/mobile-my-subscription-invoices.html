<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile-layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Subscription Invoices</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-4">
        <h1 class="text-xl font-bold text-gray-800">Subscription Invoices</h1>
        <p class="text-sm text-gray-500 mt-1">Invoice history for your subscriptions</p>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="bg-white rounded-xl p-3 shadow-sm border-l-4 border-green-500">
            <p class="text-xs text-gray-500">Paid</p>
            <p class="text-lg font-bold text-gray-800" th:text="${paidInvoiceCount}">0</p>
        </div>
        <div class="bg-white rounded-xl p-3 shadow-sm border-l-4 border-yellow-500">
            <p class="text-xs text-gray-500">Pending</p>
            <p class="text-lg font-bold text-gray-800" th:text="${pendingInvoiceCount}">0</p>
        </div>
        <div class="bg-white rounded-xl p-3 shadow-sm border-l-4 border-blue-500">
            <p class="text-xs text-gray-500">Paid Total</p>
            <p class="text-sm font-bold text-gray-800" th:text="${'₦' + #numbers.formatDecimal(totalAmountPaid,1,2)}">₦0.00</p>
        </div>
    </div>

    <div th:if="${subscriptionInvoices == null or #lists.isEmpty(subscriptionInvoices)}"
         class="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-sm">
        No subscription invoices yet.
    </div>

    <div th:if="${subscriptionInvoices != null and !#lists.isEmpty(subscriptionInvoices)}" class="space-y-3">
        <div th:each="inv : ${subscriptionInvoices}" class="bg-white rounded-xl p-4 shadow-sm">
            <p class="text-xs text-gray-500" th:text="${inv.merchantId}">SUB-1-2026-05-01</p>
            <p class="text-sm font-semibold text-gray-800 mt-1" th:text="${inv.description}">Subscription for Month May 2026</p>
            <div class="flex items-center justify-between mt-2">
                <p class="text-xs text-gray-600">Due: <span th:text="${inv.dueDate != null ? inv.dueDate : 'N/A'}">2026-05-01</span></p>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold uppercase"
                      th:classappend="${inv.status != null and inv.status.name() == 'PAID'} ? ' bg-green-100 text-green-700' : ' bg-yellow-100 text-yellow-700'"
                      th:text="${inv.status != null ? inv.status.name() : 'NEW'}">NEW</span>
            </div>
            <p class="text-base font-bold text-gray-800 mt-2" th:text="${inv.amount != null ? '₦' + #numbers.formatDecimal(inv.amount,1,2) : '₦0.00'}">₦0.00</p>
            <a th:if="${inv.status == null or inv.status.name() != 'PAID'}"
               th:href="@{/subscription/invoice/pay(invoiceId=${inv.id},source='mobile')}"
               class="inline-flex mt-2 items-center px-3 py-1.5 rounded-lg bg-purple-600 text-white text-xs font-semibold">Pay</a>
        </div>
    </div>
</div>
</body>
</html>
