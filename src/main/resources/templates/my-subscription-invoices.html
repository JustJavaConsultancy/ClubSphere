<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Subscription Invoices</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-5xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">My Subscription Invoices</h1>
            <p class="text-gray-500 mt-1">Invoices generated for your community subscriptions</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-green-500">
                <p class="text-sm text-gray-500">Paid Invoices</p>
                <p class="text-2xl font-bold text-gray-800" th:text="${paidInvoiceCount}">0</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-yellow-500">
                <p class="text-sm text-gray-500">Pending Invoices</p>
                <p class="text-2xl font-bold text-gray-800" th:text="${pendingInvoiceCount}">0</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-blue-500">
                <p class="text-sm text-gray-500">Total Paid</p>
                <p class="text-2xl font-bold text-gray-800" th:text="${'₦' + #numbers.formatDecimal(totalAmountPaid,1,2)}">₦0.00</p>
            </div>
        </div>

        <div th:if="${subscriptionInvoices == null or #lists.isEmpty(subscriptionInvoices)}"
             class="bg-white rounded-xl shadow-sm p-12 text-center text-gray-500">
            No subscription invoices yet.
        </div>

        <div th:if="${subscriptionInvoices != null and !#lists.isEmpty(subscriptionInvoices)}" class="space-y-3">
            <div th:each="inv : ${subscriptionInvoices}" class="bg-white rounded-xl shadow-sm p-5">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <p class="text-sm text-gray-500" th:text="${inv.merchantId}">SUB-1-2026-05-01</p>
                        <p class="text-base font-semibold text-gray-800 mt-1" th:text="${inv.description}">Subscription for Month May 2026</p>
                        <p class="text-sm text-gray-600 mt-1">
                            Due: <span th:text="${inv.dueDate != null ? inv.dueDate : 'N/A'}">2026-05-01</span>
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-bold text-gray-800" th:text="${inv.amount != null ? '₦' + #numbers.formatDecimal(inv.amount,1,2) : '₦0.00'}">₦0.00</p>
                        <span class="inline-flex mt-1 items-center px-2.5 py-0.5 rounded-full text-xs font-semibold uppercase"
                              th:classappend="${inv.status != null and inv.status.name() == 'PAID'} ? ' bg-green-100 text-green-700' : ' bg-yellow-100 text-yellow-700'"
                              th:text="${inv.status != null ? inv.status.name() : 'NEW'}">NEW</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
