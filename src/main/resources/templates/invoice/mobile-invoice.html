<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile-layout}">
<head>
    <meta charset="UTF-8">
    <title>Invoices</title>
    <style>
        .inv-header{background:linear-gradient(135deg,#0f766e,#059669);border-radius:20px;padding:24px;color:#fff;margin-bottom:20px}
        .inv-stat{background:rgba(255,255,255,.15);border-radius:12px;padding:14px;text-align:center}
        .inv-stat-val{font-size:24px;font-weight:700}
        .inv-stat-lbl{font-size:11px;opacity:.85;margin-top:2px}
        .inv-create-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0f766e,#059669);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
        .inv-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.06)}
        .inv-card-title{font-size:15px;font-weight:700;color:#1f2937;margin-bottom:6px}
        .inv-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:8px}
        .inv-badge-new{background:#dbeafe;color:#1e40af}
        .inv-badge-pending{background:#fef3c7;color:#92400e}
        .inv-badge-approved{background:#d1fae5;color:#065f46}
        .inv-badge-paid{background:#dcfce7;color:#166534}
        .inv-badge-declined{background:#fee2e2;color:#991b1b}
        .inv-meta{font-size:13px;color:#6b7280;margin-bottom:10px}
        .inv-view-btn{padding:9px 16px;background:#f3f4f6;border:none;border-radius:10px;font-size:13px;font-weight:600;color:#374151;cursor:pointer;text-decoration:none;display:inline-block}
        .inv-empty{text-align:center;padding:40px 20px;color:#9ca3af;background:#fff;border-radius:16px;border:2px dashed #e5e7eb}
    </style>
</head>
<body>
<div layout:fragment="content">

    <div class="inv-header">
        <h1 style="font-size:22px;font-weight:700;margin-bottom:16px">Invoices</h1>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
            <div class="inv-stat">
                <div class="inv-stat-val" th:text="${pendingInvoiceCount}">0</div>
                <div class="inv-stat-lbl">Pending</div>
            </div>
            <div class="inv-stat">
                <div class="inv-stat-val" th:text="${paidInvoiceCount}">0</div>
                <div class="inv-stat-lbl">Paid</div>
            </div>
            <div class="inv-stat">
                <div class="inv-stat-val" th:text="'₦' + ${totalAmount}">₦0</div>
                <div class="inv-stat-lbl">Earned</div>
            </div>
        </div>
    </div>

    <a th:href="@{/mobile/invoice/create}" class="inv-create-btn">
        <span class="material-icons">add</span> Create Invoice
    </a>

    <div th:if="${allInvoices == null or #lists.isEmpty(allInvoices)}" class="inv-empty">
        <span class="material-icons" style="font-size:48px;margin-bottom:12px">receipt_long</span>
        <p style="font-size:16px;font-weight:600;color:#374151;margin-bottom:6px">No Invoices Yet</p>
        <p>Create your first invoice to get started.</p>
    </div>

    <div th:each="inv : ${allInvoices}" class="inv-card">
        <div class="inv-card-title" th:text="${inv.businessName} ?: 'Invoice'">Invoice</div>
        <div class="inv-meta">
            Client: <span th:text="${inv.clientName}">–</span> &nbsp;|&nbsp;
            Amount: <strong th:text="'₦' + ${inv.amount}">₦0</strong>
        </div>
        <span th:switch="${inv.status}">
            <span th:case="'new'" class="inv-badge inv-badge-new">New</span>
            <span th:case="'pending'" class="inv-badge inv-badge-pending">Pending</span>
            <span th:case="'approved'" class="inv-badge inv-badge-approved">Approved</span>
            <span th:case="'paid'" class="inv-badge inv-badge-paid">Paid</span>
            <span th:case="'declined'" class="inv-badge inv-badge-declined">Declined</span>
            <span th:case="*" class="inv-badge inv-badge-new" th:text="${inv.status}">–</span>
        </span>
        <br/>
        <a th:if="${inv.processId != null}" th:href="@{/mobile/invoice/view/__${inv.processId}__}" class="inv-view-btn" style="margin-top:8px">
            View Details
        </a>
    </div>
</div>
</body>
</html>
