<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile-layout}">
<head><meta charset="UTF-8"><title>Invoice Review</title></head>
<body>
<div layout:fragment="content">
    <div style="margin-bottom:20px;">
        <h1 style="font-size:1.4rem;font-weight:700;color:#1f2937;margin:0 0 4px 0;">Invoice Review</h1>
        <p style="font-size:13px;color:#6b7280;margin:0;">Review and approve pending invoices</p>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;">
        <div style="background:white;border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.05);">
            <div style="font-size:1.6rem;font-weight:700;color:#f59e0b;" th:text="${allPendingCount}">0</div>
            <div style="font-size:11px;color:#6b7280;">Pending</div>
        </div>
        <div style="background:white;border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.05);">
            <div style="font-size:1.6rem;font-weight:700;color:#10b981;" th:text="${allApprovedCount}">0</div>
            <div style="font-size:11px;color:#6b7280;">Approved</div>
        </div>
        <div style="background:white;border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.05);">
            <div style="font-size:1.6rem;font-weight:700;color:#ef4444;" th:text="${allDeclinedCount}">0</div>
            <div style="font-size:11px;color:#6b7280;">Declined</div>
        </div>
    </div>

    <!-- Pending invoices -->
    <div th:if="${allPendingInvoice == null or #lists.isEmpty(allPendingInvoice)}"
         style="text-align:center;padding:40px 20px;background:white;border-radius:16px;border:2px dashed #e5e7eb;">
        <div style="font-size:3rem;margin-bottom:12px;">📋</div>
        <h3 style="font-size:16px;font-weight:600;color:#374151;margin:0;">No pending reviews</h3>
    </div>
    <div th:each="inv : ${allPendingInvoice}"
         style="background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.05);">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="font-size:14px;font-weight:600;color:#1f2937;" th:text="${inv.businessName ?: 'Invoice'}">Business</span>
            <span style="font-size:12px;font-weight:600;color:#f59e0b;">₦ <span th:text="${inv.amount ?: '0'}">0</span></span>
        </div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:10px;">
            Client: <span th:text="${inv.clientName ?: 'N/A'}">Name</span>
        </div>
        <a th:href="@{/mobile/invoice/invoice-review/{id}(id=${inv.taskId})}"
           style="display:block;text-align:center;padding:10px;background:linear-gradient(135deg,#4f46e5,#6366f1);color:white;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;">
            Review Invoice →
        </a>
    </div>
</div>
</body>
</html>
