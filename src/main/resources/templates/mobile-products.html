<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile-layout}">
<head>
    <meta charset="UTF-8">
    <title>My Products &amp; Services</title>
</head>
<body>
<div layout:fragment="content">
    <div style="margin-bottom:16px;">
        <h1 style="font-size:1.3rem;font-weight:700;color:#1f2937;margin:0 0 4px 0;">My Products &amp; Services</h1>
        <p style="font-size:13px;color:#6b7280;margin:0;">Manage and showcase your products to the community</p>
    </div>

    <div style="margin-bottom:16px;">
        <a th:href="@{/products/mobile/add}"
           style="display:block;width:100%;padding:12px;background:linear-gradient(135deg,#4f46e5,#6366f1);color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;box-sizing:border-box;">
            + Add Product / Service
        </a>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(products)}"
         style="background:white;border-radius:16px;padding:32px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-align:center;">
        <div style="font-size:48px;margin-bottom:12px;">📦</div>
        <h3 style="font-size:1rem;font-weight:600;color:#1f2937;margin:0 0 8px 0;">No products yet</h3>
        <p style="font-size:13px;color:#6b7280;margin:0 0 16px 0;">Start by adding your first product or service</p>
        <a th:href="@{/products/mobile/add}"
           style="display:inline-block;padding:10px 24px;background:#4f46e5;color:white;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;">
            Add Your First Product
        </a>
    </div>

    <!-- Products List -->
    <div th:if="${!#lists.isEmpty(products)}" style="display:flex;flex-direction:column;gap:12px;">
        <div th:each="product : ${products}"
             style="background:white;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;">
            <!-- Product Image -->
            <div th:if="${product.imageUrl}" style="height:160px;overflow:hidden;">
                <img th:src="${product.imageUrl}" th:alt="${product.name}"
                     style="width:100%;height:100%;object-fit:cover;"
                     onerror="this.parentElement.style.display='none'">
            </div>
            <div th:unless="${product.imageUrl}"
                 style="height:100px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;">
                <span style="font-size:40px;">📦</span>
            </div>

            <!-- Product Info -->
            <div style="padding:14px;">
                <h3 style="font-size:15px;font-weight:600;color:#1f2937;margin:0 0 6px 0;" th:text="${product.name}">Product Name</h3>
                <p style="font-size:13px;color:#6b7280;margin:0 0 8px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                   th:text="${product.description}">Description</p>
                <div style="font-size:18px;font-weight:700;color:#059669;margin-bottom:12px;"
                     th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</div>

                <div style="display:flex;gap:8px;">
                    <a th:href="'/products/mobile/edit/' + ${product.id}"
                       style="flex:1;padding:10px;background:#4f46e5;color:white;border-radius:10px;font-size:13px;font-weight:600;text-align:center;text-decoration:none;">
                        Edit
                    </a>
                    <form th:action="'/products/mobile/delete/' + ${product.id}" method="post" style="flex:1;">
                        <button type="submit"
                                style="width:100%;padding:10px;background:#ef4444;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;"
                                onclick="return confirm('Delete this product?')">
                            Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
