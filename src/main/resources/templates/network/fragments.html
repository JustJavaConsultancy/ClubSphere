<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:hx-on="http://www.w3.org/1999/xhtml">
<body>

<!-- Invitations Container -->
<div id="invitations-container">
    <div th:fragment="invitations-list">
        <div th:if="${#lists.isEmpty(invitations)}" class="text-center py-8">
            <div class="mx-auto w-16 h-16 mb-4 text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900 mb-2">No pending invitations</h3>
            <p class="text-gray-500 mb-4">When someone sends you an invitation, it will appear here.</p>
        </div>

        <div th:if="${!#lists.isEmpty(invitations)}"
             th:each="invitation : ${invitations}"
             class="flex items-start space-x-4 p-3 rounded-lg hover:bg-gray-50 transition-colors">

            <div>
                <div th:text="${#strings.substring(invitation.fullName,0,2)}"
                     class="avatar" style="margin-right:0">
                    AA
                </div>
            </div>

            <div class="flex-1">
                <p th:text="${invitation.fullName}" class="font-semibold text-gray-900">Michael Chen</p>
                <p class="text-sm text-gray-500">Member</p>

                <div class="flex space-x-2 mt-2">
                    <button class="px-4 py-1 text-sm font-medium text-white bg-indigo-600 border border-indigo-600 rounded-full hover:bg-indigo-700 transition-colors"
                            th:attr="hx-post='/network/approve/' + ${invitation.groupId}"
                            hx-target="#invitations-container"
                            hx-swap="outerHTML"
                            hx-trigger="click"
                            hx-on::afterRequest="
                                htmx.ajax('GET', '/network/invitations-fragment', {target:'#invitations-container', swap:'outerHTML'});
                                htmx.ajax('GET', '/network/network-fragment', {target:'#network-container', swap:'outerHTML'});
                            ">
                        Accept
                    </button>

                    <button class="px-4 py-1 text-sm font-medium text-gray-600 border border-gray-300 rounded-full hover:bg-gray-100 transition-colors">
                        Decline
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Network Container -->
<div id="network-container">
    <div th:fragment="network-list">
        <div th:if="${#lists.isEmpty(myNetwork)}" class="text-center py-12">
            <div class="mx-auto w-24 h-24 mb-6 text-gray-200 animate-float">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
            </div>
            <h3 class="text-xl font-semibold text-gray-900 mb-2">Your network is empty</h3>
            <p class="text-gray-500 max-w-md mx-auto mb-6">
                Start building your professional network by connecting with colleagues, friends, and people you'd like to know.
            </p>
        </div>

        <div th:if="${!#lists.isEmpty(myNetwork)}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <div th:each="connection : ${myNetwork}" class="network-card bg-white rounded-lg p-4 text-center">
                <div class="relative inline-block">
                    <div class="w-16 h-16 rounded-full mx-auto bg-indigo-600 flex items-center justify-center">
                        <span class="text-white font-bold"
                              th:text="${#strings.substring(connection.firstName,0,1) + #strings.substring(connection.lastName,0,1)}">AA</span>
                    </div>
                </div>
                <p class="font-semibold text-gray-900 mt-3"
                   th:text="${connection.firstName + ' ' + connection.lastName}">Sophia Bennett</p>
                <p class="text-sm text-gray-500 mt-1">Member</p>
                <button class="mt-4 w-full px-4 py-2 text-sm font-medium text-indigo-600 border border-indigo-600 rounded-full hover:bg-indigo-50 transition-colors">
                    Message
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
