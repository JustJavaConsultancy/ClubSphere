<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile-layout}">
<head>
    <meta charset="UTF-8">
    <title>My Network - Clubknit</title>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <style>
        .connect-btn.connected {
          background-color: #10b981;
          color: white;
          cursor: not-allowed;
        }
        .connect-btn.loading {
          opacity: 0.7;
        }
        .search-results {
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: white;
          border-radius: 0 0 16px 16px;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
          backdrop-filter: blur(10px);
          max-height: 300px;
          overflow-y: auto;
          z-index: 1000;
          display: none;
        }
        .search-result-item {
          display: flex;
          align-items: center;
          padding: 16px;
          border-bottom: 1px solid rgba(0, 0, 0, 0.1);
          transition: all 0.2s ease;
        }
        .search-result-item:hover {
          background-color: rgba(42, 36, 148, 0.05);
        }
        .search-result-item:last-child {
          border-bottom: none;
        }
        .avatar {
          width: 48px;
          height: 48px;
          border-radius: 50%;
          background: linear-gradient(135deg, #2A2494, #3730a3);
          color: white;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: bold;
          margin-right: 16px;
          flex-shrink: 0;
          font-size: 18px;
          box-shadow: 0 4px 12px rgba(42, 36, 148, 0.3);
        }
        .user-info {
          flex-grow: 1;
          min-width: 0;
        }
        .user-name {
          font-weight: 600;
          color: #111827;
          font-size: 16px;
          margin-bottom: 2px;
        }
        .user-email {
          font-size: 14px;
          color: #6b7280;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .loading-indicator, .no-results {
          padding: 24px;
          text-align: center;
          color: #6b7280;
          font-size: 14px;
        }
        .connect-btn {
          padding: 8px 16px;
          background: linear-gradient(135deg, #2A2494, #3730a3);
          color: white;
          border: none;
          border-radius: 20px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.2s ease;
          white-space: nowrap;
          margin-left: 12px;
          box-shadow: 0 4px 12px rgba(42, 36, 148, 0.3);
          min-height: 44px;
          min-width: 80px;
        }
        .connect-btn:hover {
          transform: translateY(-1px);
          box-shadow: 0 6px 16px rgba(42, 36, 148, 0.4);
        }
        .connect-btn:active {
          transform: scale(0.95);
        }
        .mobile-card {
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.2);
          border-radius: 20px;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
          margin-bottom: 20px;
          overflow: hidden;
          transition: all 0.3s ease;
        }
        .mobile-card:active {
          transform: scale(0.98);
        }
        .mobile-card-header {
          padding: 20px 20px 16px 20px;
          border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .mobile-card-content {
          padding: 20px;
        }
        .suggestion-chip {
          display: inline-flex;
          align-items: center;
          padding: 8px 16px;
          background: linear-gradient(135deg, #ede9fe, #ddd6fe);
          color: #2A2494;
          border-radius: 20px;
          font-size: 14px;
          font-weight: 500;
          margin: 4px 8px 4px 0;
          transition: all 0.2s ease;
          border: 1px solid rgba(42, 36, 148, 0.2);
        }
        .suggestion-chip:hover {
          background: linear-gradient(135deg, #ddd6fe, #c4b5fd);
          transform: translateY(-1px);
        }
        .network-stats {
          background: linear-gradient(135deg, #2A2494, #3730a3);
          color: white;
          padding: 24px;
          border-radius: 24px;
          margin-bottom: 24px;
          text-align: center;
          box-shadow: 0 8px 32px rgba(42, 36, 148, 0.3);
          position: relative;
          overflow: hidden;
        }
        .network-stats::before {
          content: '';
          position: absolute;
          top: -50%;
          right: -50%;
          width: 200%;
          height: 200%;
          background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
          animation: float 6s ease-in-out infinite;
        }
        .network-count {
          font-size: 32px;
          font-weight: 900;
          margin-bottom: 4px;
          position: relative;
          z-index: 1;
        }
        .network-label {
          font-size: 16px;
          opacity: 0.9;
          position: relative;
          z-index: 1;
        }
        @keyframes float {
          0% { transform: translateY(0px) rotate(0deg); }
          50% { transform: translateY(-10px) rotate(180deg); }
          100% { transform: translateY(0px) rotate(360deg); }
        }
        .invitation-item {
          display: flex;
          align-items: center;
          padding: 16px;
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(10px);
          border-radius: 16px;
          margin-bottom: 12px;
          border: 1px solid rgba(255, 255, 255, 0.2);
          transition: all 0.3s ease;
        }
        .invitation-item:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .invitation-actions {
          display: flex;
          gap: 8px;
          margin-top: 12px;
        }
        .btn-accept {
          flex: 1;
          padding: 10px 16px;
          background: linear-gradient(135deg, #10b981, #059669);
          color: white;
          border: none;
          border-radius: 12px;
          font-weight: 600;
          font-size: 14px;
          min-height: 44px;
          transition: all 0.2s ease;
        }
        .btn-accept:active {
          transform: scale(0.95);
        }
        .btn-decline {
          flex: 1;
          padding: 10px 16px;
          background: rgba(255, 255, 255, 0.8);
          backdrop-filter: blur(10px);
          color: #6b7280;
          border: 1px solid rgba(0, 0, 0, 0.1);
          border-radius: 12px;
          font-weight: 600;
          font-size: 14px;
          min-height: 44px;
          transition: all 0.2s ease;
        }
        .btn-decline:active {
          transform: scale(0.95);
          background: rgba(255, 255, 255, 0.9);
        }
        .network-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 16px;
          margin-top: 16px;
        }
        .network-card {
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(10px);
          border-radius: 16px;
          padding: 20px;
          text-align: center;
          border: 1px solid rgba(255, 255, 255, 0.2);
          transition: all 0.3s ease;
        }
        .network-card:hover {
          transform: translateY(-4px);
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .network-avatar {
          width: 60px;
          height: 60px;
          border-radius: 50%;
          background: linear-gradient(135deg, #2A2494, #3730a3);
          color: white;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: bold;
          margin: 0 auto 12px auto;
          font-size: 20px;
          box-shadow: 0 4px 12px rgba(42, 36, 148, 0.3);
        }
        .message-btn {
          width: 100%;
          padding: 8px 16px;
          background: rgba(255, 255, 255, 0.8);
          backdrop-filter: blur(10px);
          color: #475569;
          border: 1px solid rgba(0, 0, 0, 0.1);
          border-radius: 12px;
          font-size: 14px;
          font-weight: 500;
          margin-top: 12px;
          min-height: 40px;
          transition: all 0.2s ease;
        }
        .message-btn:hover {
          background: rgba(42, 36, 148, 0.1);
        }
        .message-btn:active {
          transform: scale(0.95);
        }
        .empty-state {
          text-align: center;
          padding: 40px 20px;
          color: #6b7280;
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(10px);
          border-radius: 20px;
          border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .empty-state-icon {
          width: 80px;
          height: 80px;
          margin: 0 auto 20px auto;
          opacity: 0.5;
          color: #2A2494;
        }
        .search-input {
          font-size: 16px;
          padding: 16px 20px 16px 48px;
          border-radius: 16px;
          border: 2px solid rgba(0, 0, 0, 0.1);
          transition: all 0.2s ease;
          background: rgba(255, 255, 255, 0.9);
          backdrop-filter: blur(10px);
        }
        .search-input:focus {
          border-color: #2A2494;
          background: white;
          box-shadow: 0 0 0 4px rgba(42, 36, 148, 0.1);
          outline: none;
        }
        .search-icon {
          position: absolute;
          left: 16px;
          top: 50%;
          transform: translateY(-50%);
          color: #9ca3af;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <!-- Hidden field for community context -->
    <input type="hidden" id="selectedCommunityId" th:value="${selectedCommunityId}" />

    <!-- Community context banner -->
    <div th:if="${selectedCommunityName != null}" class="mb-3 mx-1 px-4 py-3 bg-indigo-50 border border-indigo-200 rounded-2xl flex items-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        <span class="text-sm font-medium text-indigo-800">Network for: <strong th:text="${selectedCommunityName}">Club</strong></span>
    </div>

    <!-- Network Stats -->
    <div class="network-stats">
        <div class="network-count" id="network-count" th:text="${networkUsers}">0</div>
        <div class="network-label">Connections</div>
    </div>

    <!-- Search Section -->
    <div class="mobile-card">
        <div class="mobile-card-header">
            <h2 class="text-xl font-bold text-gray-800 mb-2">Find People</h2>
            <p class="text-sm text-gray-600">Discover and connect with professionals</p>
        </div>
        <div class="mobile-card-content">
            <div class="relative">
                <div class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input
                        id="main-search"
                        placeholder="Search by name or email..."
                        class="search-input w-full"
                />
                <div id="search-results" class="search-results"></div>
            </div>

            <div class="mt-4">
                <p class="text-sm font-medium text-gray-500 mb-3">Quick suggestions:</p>
                <div class="flex flex-wrap">
                    <button class="suggestion-chip">Designers</button>
                    <button class="suggestion-chip">Developers</button>
                    <button class="suggestion-chip">Marketing</button>
                    <button class="suggestion-chip">Remote</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Invitations Section -->
    <div class="mobile-card">
        <div class="mobile-card-header">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">Invitations</h2>
                <span class="text-sm font-medium" style="color: #2A2494;">See all</span>
            </div>
        </div>
        <div class="mobile-card-content">
            <div id="invitations-container"
                 hx-get="/mobile/network/invitations-fragment"
                 hx-trigger="load, networkUpdated from:body">
                <!-- Content will be loaded via HTMX -->
            </div>
        </div>
    </div>

    <!-- Suggested Connections -->
    <div class="mobile-card">
        <div class="mobile-card-header">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">Suggested for You</h2>
                <span class="text-sm font-medium" style="color: #2A2494;">See all</span>
            </div>
        </div>
        <div class="mobile-card-content">
            <div class="space-y-3">
                <div th:each="user : ${allUser}" class="invitation-item">
                    <div class="flex items-center flex-1">
                        <div class="avatar" th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}">
                            AA
                        </div>
                        <div class="user-info">
                            <div class="user-name" th:text="${user.firstName + ' ' + user.lastName}">Lisa Wang</div>
                            <div class="user-email text-sm text-gray-500">Member</div>
                        </div>
                    </div>
                    <form hx-post="/mobile/network/invite" hx-trigger="submit" hx-swap="none">
                        <input type="hidden" name="userId" th:value="${user.userId}" />
                        <button type="submit" class="connect-btn">Clubknit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- My Network Section -->
    <div class="mobile-card">
        <div class="mobile-card-header">
            <h2 class="text-xl font-bold text-gray-800">My Network</h2>
        </div>
        <div class="mobile-card-content">
            <div id="network-container"
                 hx-get="/mobile/network/network-fragment"
                 hx-trigger="load, networkUpdated from:body">
                <!-- Content will be loaded via HTMX -->
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('main-search');
        const searchResults = document.getElementById('search-results');
        let debounceTimer;

        function generateAvatar(firstName, lastName) {
          return (firstName.charAt(0) + lastName.charAt(0)).toUpperCase();
        }

        async function fetchUsers(searchTerm = '') {
          try {
            searchResults.innerHTML = '<div class="loading-indicator">Searching...</div>';
            searchResults.style.display = 'block';

            // Fetch community-scoped users
            const communityId = document.getElementById('selectedCommunityId')?.value || '';
            const url = communityId
                ? '/api-v/publicNetworkUsers?communityId=' + communityId
                : '/api-v/publicUsers';
            const response = await fetch(url);
            const users = await response.json();

            const filteredUsers = users.filter(user => {
              const fullName = `${user.firstName} ${user.lastName}`.toLowerCase();
              const email = user.email.toLowerCase();
              const term = searchTerm.toLowerCase();
              return (
                fullName.includes(term) ||
                email.includes(term)
              );
            });

            searchResults.innerHTML = '';
            if (filteredUsers.length === 0) {
              searchResults.innerHTML = '<div class="no-results">No users found</div>';
              return;
            }

            filteredUsers.forEach(user => {
              const avatarText = generateAvatar(user.firstName, user.lastName);
              const resultItem = document.createElement('div');
              resultItem.className = 'search-result-item';
              resultItem.innerHTML = `
                <div class="avatar">${avatarText}</div>
                <div class="user-info">
                  <div class="user-name">${user.firstName} ${user.lastName}</div>
                  <div class="user-email">${user.email}</div>
                </div>
                <form hx-post="/mobile/network/invite" hx-trigger="submit" hx-swap="none">
                  <input type="hidden" name="userId" value="${user.userId}" />
                  <button type="submit" class="connect-btn">Clubknit</button>
                </form>
              `;
              searchResults.appendChild(resultItem);
              htmx.process(resultItem);
            });

          } catch (error) {
            console.error('Error fetching users:', error);
            searchResults.innerHTML = '<div class="no-results">Error loading results</div>';
          }
        }

        searchInput.addEventListener('input', () => {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            const term = searchInput.value.trim();
            if (term.length > 1) {
              fetchUsers(term);
            } else {
              searchResults.style.display = 'none';
            }
          }, 300);
        });

        document.addEventListener("htmx:beforeRequest", function(event) {
          const form = event.target;
          if (form.matches("form[hx-post='/mobile/network/invite']")) {
            const button = form.querySelector(".connect-btn");
            if (button) {
              button.disabled = true;
              button.textContent = "Connecting...";
              button.classList.add("loading");
            }
          }
        });

        document.addEventListener("htmx:afterRequest", function(event) {
          const form = event.target;
          if (form.matches("form[hx-post='/mobile/network/invite']")) {
            const button = form.querySelector(".connect-btn");
            if (button) {
              button.textContent = "Sent";
              button.classList.remove("loading");
              button.classList.add("connected");
              button.disabled = true;
            }
          }
        });

        document.addEventListener("htmx:responseError", function(event) {
          const form = event.target;
          if (form.matches("form[hx-post='/mobile/network/invite']")) {
            const button = form.querySelector(".connect-btn");
            if (button) {
              button.disabled = false;
              button.textContent = "Clubknit";
              button.classList.remove("loading", "connected");
            }
          }
        });

        document.addEventListener('click', function(event) {
          if (!searchResults.contains(event.target) && event.target !== searchInput) {
            searchResults.style.display = 'none';
          }
        });
    </script>
</div>
</body>
</html>
