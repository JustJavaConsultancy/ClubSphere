<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="p-6" th:fragment="ticketDetails">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold text-gray-800">Ticket Details</h3>
        <button class="text-gray-400 hover:text-gray-600"
                id="close-claim-modal"
                onclick="document.querySelectorAll('#ticket-modal,#claim-modal').forEach(m=>m.classList.remove('active')); document.body.style.overflow='';">
            ✕
        </button>
    </div>

    <!-- Ticket Info -->
    <div class="bg-gray-50 p-4 rounded-lg mb-6">
        <div class="flex justify-between items-start mb-4">
            <h4 class="text-lg font-medium text-gray-800" th:text="${ticket.subject}">Technical issue with video calls</h4>
            <span class="ticket-status open" th:text="${ticket.status}">Open</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            <div><span class="text-gray-500">Ticket ID:</span><span class="font-medium ml-2" th:text="${ticket.id}">CON-2837</span></div>
            <div><span class="text-gray-500">Priority:</span><span class="font-medium ml-2" th:text="${ticket.priority}">low</span></div>
            <div><span class="text-gray-500">Submitted by:</span><span class="font-medium ml-2" th:text="${username}">User</span></div>
            <div><span class="text-gray-500">Assigned To:</span><span class="font-medium ml-2">Unassigned</span></div>
            <!-- Source: group ticket shows group + its parent community; community ticket shows community only -->
            <div th:if="${groupName != null}" class="md:col-span-2 flex items-center gap-3 flex-wrap">
                <span class="text-gray-500">Source:</span>
                <span class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full bg-blue-50 text-blue-700">
                    <i class="fas fa-users"></i>
                    <span th:text="${communityName}"></span>
                </span>
                <i class="fas fa-chevron-right text-gray-400 text-xs"></i>
                <span class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full bg-purple-50 text-purple-700">
                    <i class="fas fa-layer-group"></i>
                    <span th:text="${groupName}"></span>
                </span>
            </div>
            <div th:if="${groupName == null and communityName != null}" class="md:col-span-2">
                <span class="text-gray-500">Source:</span>
                <span class="ml-2 inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full bg-blue-50 text-blue-700">
                    <i class="fas fa-users"></i>
                    <span th:text="${communityName}"></span>
                </span>
            </div>
        </div>
    </div>

    <!-- Claim Ticket — works for both desktop (/support) and mobile (/mobile/support) -->
    <div id="claim-section" class="mb-6">
        <!-- Desktop claim button (shown when accessed from /support/agent/claim-ticket) -->
        <button class="claim-btn w-full py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-semibold text-base"
                th:attr="hx-post=@{/support/submit-claim/{id}(id=${ticket.id})}"
                hx-trigger="click"
                th:if="${isMobile == null or !isMobile}">
            Claim This Ticket
        </button>
        <!-- Mobile claim button -->
        <button class="claim-btn w-full py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-semibold text-base"
                th:attr="hx-post=@{/mobile/support/submit-claim/{id}(id=${ticket.id})}"
                hx-trigger="click"
                th:if="${isMobile != null and isMobile}">
            Claim This Ticket
        </button>
    </div>

    <!-- Description preview -->
    <div class="mb-6">
        <h4 class="font-medium text-gray-800 mb-3">Description</h4>
        <div class="bg-gray-50 rounded-xl p-4">
            <p class="text-sm text-gray-700" th:text="${ticket.description}">Description text</p>
            <span class="text-xs text-gray-400 mt-2 block"
                  th:text="${username} + ' — ' + ${#temporals.format(ticket.dateCreated, 'MMM dd, yyyy HH:mm')}">User — Date</span>
        </div>
    </div>
</div>
</body>
</html>
