<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" xmlns:hx-on="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="UTF-8">
  <title>Support Tickets</title>
  <style>
    /* Ticket status styles */
    .ticket-status {
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-weight: 500;
    }
    .ticket-status.open { background-color: #DEF7EC; color: #046C4E; }
    .ticket-status.pending { background-color: #FDF6B2; color: #8E4B10; }
    .ticket-status.resolved { background-color: #E5E7EB; color: #374151; }
    .ticket-status.urgent { background-color: #FDE8E8; color: #9B1C1C; }

    /* Ticket item */
    .ticket-item { transition: all 0.2s ease; border-left: 3px solid transparent; }
    .ticket-item:hover { border-left-color: #2563eb; background-color: #f9fafb; }

    /* Priority indicators */
    .priority-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .priority-high { background-color: #F87171; }
    .priority-medium { background-color: #FBBF24; }
    .priority-low { background-color: #60A5FA; }

    /* Ticket detail modal */
    .ticket-modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5);
      z-index: 100; justify-content: center; align-items: center;
    }
    .ticket-modal.active { display: flex; }
    .ticket-modal-content {
      background-color: white; border-radius: 12px;
      width: 90%; max-width: 800px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      padding: 1rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: #f9fafb;
      border-radius: 12px;
      border: 2px dashed #d1d5db;
    }
    .empty-icon {
      font-size: 3rem;
      color: #9ca3af;
      margin-bottom: 1rem;
    }
    .empty-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #374151;
    }
    .empty-text {
      font-size: 0.95rem;
      color: #6b7280;
      margin-top: 0.5rem;
    }
    .empty-btn {
      margin-top: 1.5rem;
      background: #2563eb;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      display: inline-block;
    }
    .empty-btn:hover { background: #1d4ed8; }

    /* Chat bubbles */
    .chat-msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; margin-bottom: 10px; }
    .chat-user { background: #DBEAFE; align-self: flex-start; }
    .chat-agent { background: #E5E7EB; align-self: flex-end; }
    .chat-box { display: flex; flex-direction: column; gap: 10px; }
    .chat-input { resize: none; }

    /* Claim button */
    .claim-btn { background: #10B981; color: white; padding: 8px 14px; border-radius: 8px; font-weight: 500; }
    .claim-btn:hover { background: #059669; }
  </style>
  <script src="https://unpkg.com/hyperscript.org@0.9.7"></script>
</head>
<body>
<div layout:fragment="content">
  <!-- Ticket Detail Modal -->
  <div class="ticket-modal" id="ticket-modal">
    <div class="ticket-modal-content">
    </div>
  </div>

  <!-- Tickets Table / Empty State -->
  <main class="flex-1 px-4 py-6 sm:px-6 sm:py-8 max-w-6xl mx-auto w-full">
    <h1 class="text-2xl font-bold mb-6">Claim Support Tickets</h1>

    <!-- If empty -->
    <div th:if="${#lists.isEmpty(unAssignedTickets)}" class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">No tickets available</div>
      <p class="empty-text">There are currently no unassigned support tickets. Great job keeping up!</p>
      <a href="/support/agent/claim-ticket" class="empty-btn">Refresh</a>
    </div>

    <!-- If not empty -->
    <div th:if="${!#lists.isEmpty(unAssignedTickets)}">
    <!-- Search -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6" style="transition: 0.3s;">
        <input id="agentTicketSearch" placeholder="Search tickets..." class="pl-4 pr-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent w-full" value="">
    </div>

    <table class="w-full bg-white rounded-xl shadow-sm overflow-hidden">
      <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Ticket</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Status</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr class="ticket-item" th:each="ticket : ${unAssignedTickets}">
        <td class="px-6 py-4" th:text="${'CON-' + ticket.id}">
          CON-2837<br>
          <span class="text-gray-500" th:text="${ticket.subject}">Video Call Issue</span>
        </td>


        <td class="px-6 py-4"><span class="ticket-status open" th:text="${ticket.status}">Open</span></td>
        <td class="px-6 py-4">
          <button class="text-blue-600 hover:text-blue-900 view-ticket-btn"
                  th:hx-get="@{/support/agent/claim-ticket/{id}(id=${ticket.id})}"
                  hx-target="#ticket-modal .ticket-modal-content"
                  hx-swap="innerHTML">View</button>
        </td>
      </tr>
      </tbody>
    </table>

    <!-- Pagination -->
    <div class="bg-white rounded-b-xl shadow-sm px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
        <div class="sm:flex-1 sm:flex sm:items-center sm:justify-between">
            <div>
                <p class="text-sm text-gray-700" id="agentPaginationInfo"></p>
            </div>
            <div>
                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" id="agentPaginationNav" aria-label="Pagination">
                </nav>
            </div>
        </div>
    </div>
    </div>
  </main>

  <script>
    const ticketModal = document.getElementById('ticket-modal');

    // Open ticket modal (delegated for HTMX compatibility)
    document.addEventListener('click', function(e) {
        if (e.target.closest('.view-ticket-btn')) {
            ticketModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    });

    // Close modal (delegated because modal content is dynamic)
    document.addEventListener('click', (e) => {
      if (e.target.id === 'close-ticket-modal') {
        ticketModal.classList.remove('active');
        document.body.style.overflow = 'auto';
      }
    });

    // === Client-Side Pagination & Search ===
    (function() {
        const PAGE_SIZE = 10;
        let currentPage = 1;
        const rows = Array.from(document.querySelectorAll('tr.ticket-item'));
        let filtered = rows;
        const nav = document.getElementById('agentPaginationNav');
        const info = document.getElementById('agentPaginationInfo');
        const searchInput = document.getElementById('agentTicketSearch');

        function render() {
            const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;

            rows.forEach(r => r.style.display = 'none');
            filtered.forEach((r, i) => r.style.display = (i >= start && i < end) ? '' : 'none');

            if (info) {
                if (filtered.length === 0) {
                    info.textContent = 'No tickets found';
                } else {
                    info.innerHTML = 'Showing <span class="font-medium">' + (start + 1) +
                        '</span> to <span class="font-medium">' + Math.min(end, filtered.length) +
                        '</span> of <span class="font-medium">' + filtered.length + '</span> results';
                }
            }

            if (!nav) return;
            nav.innerHTML = '';
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = 'relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50';
            prevBtn.innerHTML = '<svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = function(e) { e.preventDefault(); currentPage--; render(); };
            nav.appendChild(prevBtn);

            for (let p = 1; p <= totalPages; p++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = p;
                pageBtn.className = 'relative inline-flex items-center px-4 py-2 border text-sm font-medium ' +
                    (p === currentPage
                        ? 'z-10 bg-blue-50 border-blue-500 text-blue-600'
                        : 'border-gray-300 bg-white text-gray-700 hover:bg-gray-50');
                pageBtn.onclick = function(e) { e.preventDefault(); currentPage = p; render(); };
                nav.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50';
            nextBtn.innerHTML = '<svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = function(e) { e.preventDefault(); currentPage++; render(); };
            nav.appendChild(nextBtn);
        }

        if (searchInput) {
            searchInput.addEventListener('input', function() {
                const q = this.value.toLowerCase();
                filtered = rows.filter(r => r.textContent.toLowerCase().includes(q));
                currentPage = 1;
                render();
            });
        }

        render();
    })();
  </script>
</div>
</body>
</html>
