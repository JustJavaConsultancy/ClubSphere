<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mobile-layout}">

<head>
    <meta charset="UTF-8">
    <title>Unclaimed Tickets</title>
    <script src="https://unpkg.com/hyperscript.org@0.9.7"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        .ticket-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f3f4f6;
            transition: all 0.2s ease;
        }
        .ticket-card:active { transform: scale(0.98); }
        .ticket-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .ticket-status.open   { background:#DEF7EC; color:#046C4E; }
        .ticket-status.pending{ background:#FDF6B2; color:#8E4B10; }
        .ticket-status.closed { background:#E5E7EB; color:#374151; }
        .priority-badge {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 9999px;
            font-weight: 600;
        }
        .priority-high   { background:#FEE2E2; color:#991B1B; }
        .priority-medium { background:#FEF3C7; color:#92400E; }
        .priority-low    { background:#DBEAFE; color:#1E40AF; }
        /* Bottom-sheet modal */
        .claim-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
        }
        .claim-modal.active { display: flex; }
        .claim-modal-content {
            background: white;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.15);
            padding: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            background: white;
            border-radius: 16px;
            border: 2px dashed #e5e7eb;
        }
        .claim-btn {
            display: block; width: 100%;
            margin-top: 12px; padding: 12px;
            background: linear-gradient(135deg,#10b981,#059669);
            color: white; border: none;
            border-radius: 12px; font-size: 15px;
            font-weight: 600; cursor: pointer;
            text-align: center;
        }
        .claim-btn:active { opacity: 0.85; }
        .pagination-bar {
            display: flex; align-items: center;
            justify-content: center; gap: 6px;
            margin-top: 16px; padding: 12px 0;
        }
        .pagination-bar button {
            min-width: 36px; height: 36px;
            border: 1px solid #e5e7eb; background: white;
            border-radius: 10px; font-size: 14px;
            font-weight: 500; color: #374151; cursor: pointer;
        }
        .pagination-bar button.active {
            background: linear-gradient(135deg,#4f46e5,#6366f1);
            color: white; border-color: transparent;
        }
        .pagination-bar button:disabled { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <!-- Bottom-sheet claim modal -->
    <div class="claim-modal" id="claim-modal">
        <div class="claim-modal-content" id="claim-modal-body">
            <!-- loaded via HTMX -->
        </div>
    </div>

    <!-- Header -->
    <div style="margin-bottom:20px;">
        <h1 style="font-size:1.4rem;font-weight:700;color:#1f2937;margin:0 0 4px 0;">Unclaimed Tickets</h1>
        <p style="font-size:13px;color:#6b7280;margin:0;">Support requests waiting to be handled — claim one to start helping</p>
    </div>

    <!-- Access denied -->
    <div th:if="${!canManageTickets}" class="empty-state">
        <div style="font-size:3rem;margin-bottom:12px;">🔒</div>
        <h2 style="font-size:1.1rem;font-weight:600;color:#374151;margin:0 0 6px 0;">Access Restricted</h2>
        <p style="font-size:14px;color:#6b7280;margin:0;">Only club admins and support agents can claim tickets.</p>
    </div>

    <!-- Ticket list -->
    <div th:if="${canManageTickets}">

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(unAssignedTickets)}" class="empty-state">
            <div style="font-size:3rem;margin-bottom:12px;">🎉</div>
            <h2 style="font-size:1.1rem;font-weight:600;color:#374151;margin:0 0 6px 0;">All caught up!</h2>
            <p style="font-size:14px;color:#6b7280;margin:0;">There are no unclaimed tickets right now.</p>
        </div>

        <!-- Cards -->
        <div id="ticketList" th:if="${!#lists.isEmpty(unAssignedTickets)}">
            <!-- Search -->
            <div style="margin-bottom:14px;">
                <input id="ticketSearch" type="text" placeholder="Search tickets..."
                       style="width:100%;padding:12px 16px;border:1px solid #e5e7eb;border-radius:12px;font-size:15px;background:white;outline:none;">
            </div>

            <div th:each="ticket : ${unAssignedTickets}"
                 class="ticket-card ticket-item"
                 th:attr="data-subject=${ticket.subject}">

                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                    <span style="font-size:12px;color:#9ca3af;font-weight:500;" th:text="${'#TKT-' + ticket.id}">#TKT-1</span>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <span class="priority-badge"
                              th:classappend="${'priority-' + ticket.priority}"
                              th:text="${ticket.priority}">low</span>
                        <span class="ticket-status" th:classappend="${ticket.status.toLowerCase()}"
                              th:text="${ticket.status}">Pending</span>
                    </div>
                </div>

                <h3 style="font-size:15px;font-weight:600;color:#1f2937;margin:0 0 4px 0;" th:text="${ticket.subject}">Subject</h3>
                <p style="font-size:13px;color:#6b7280;margin:0 0 8px 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                   th:text="${ticket.description}">Description</p>
                <div style="font-size:12px;color:#9ca3af;" th:text="${#temporals.format(ticket.dateCreated, 'MMM dd, yyyy HH:mm')}">Date</div>

                <button class="view-claim-btn"
                        th:hx-get="@{/mobile/support/agent/claim-ticket/{id}(id=${ticket.id})}"
                        hx-target="#claim-modal-body"
                        hx-swap="innerHTML"
                        style="display:block;width:100%;margin-top:12px;padding:10px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;font-weight:500;color:#4f46e5;cursor:pointer;text-align:center;">
                    View &amp; Claim
                </button>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination-bar" id="paginationBar"></div>
    </div>

    <script>
        // Open bottom-sheet when a claim button is clicked
        const claimModal = document.getElementById('claim-modal');
        document.addEventListener('click', function(e) {
            if (e.target.closest('.view-claim-btn')) {
                claimModal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
            if (e.target.closest('#close-claim-modal')) {
                claimModal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
        claimModal.addEventListener('click', function(e) {
            if (e.target === claimModal) {
                claimModal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // Pagination
        (function() {
            const PAGE_SIZE = 6;
            let currentPage = 1;
            const items = Array.from(document.querySelectorAll('.ticket-item'));
            let filtered = items;
            const bar = document.getElementById('paginationBar');
            const searchInput = document.getElementById('ticketSearch');

            function render() {
                const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
                if (currentPage > totalPages) currentPage = totalPages;
                const start = (currentPage - 1) * PAGE_SIZE;
                const end = start + PAGE_SIZE;
                items.forEach(el => el.style.display = 'none');
                filtered.forEach((el, i) => el.style.display = (i >= start && i < end) ? '' : 'none');
                if (!bar) return;
                bar.innerHTML = '';
                if (totalPages <= 1) return;
                const prev = document.createElement('button');
                prev.textContent = '‹'; prev.disabled = currentPage === 1;
                prev.onclick = () => { currentPage--; render(); };
                bar.appendChild(prev);
                for (let p = 1; p <= totalPages; p++) {
                    const btn = document.createElement('button');
                    btn.textContent = p;
                    if (p === currentPage) btn.classList.add('active');
                    btn.onclick = () => { currentPage = p; render(); };
                    bar.appendChild(btn);
                }
                const next = document.createElement('button');
                next.textContent = '›'; next.disabled = currentPage === totalPages;
                next.onclick = () => { currentPage++; render(); };
                bar.appendChild(next);
            }

            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    filtered = items.filter(el => {
                        const subject = (el.getAttribute('data-subject') || '').toLowerCase();
                        return subject.includes(q) || el.textContent.toLowerCase().includes(q);
                    });
                    currentPage = 1; render();
                });
            }
            render();
        })();
    </script>
</div>
</body>
</html>
