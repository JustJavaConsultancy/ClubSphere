<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>ClubSphere</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
<div id="loading">Starting ClubSphere...</div>

<script src="cordova.js"></script>
<script>
    const BACKEND_BASE_URL_RAW = "clubsphere-production-a44b.up.railway.app";
    const BACKEND_BASE_URL = normalizeBaseUrl(BACKEND_BASE_URL_RAW);
    const STORAGE_NAMESPACE = "clubsphere_mobile_auth";

    document.addEventListener("deviceready", onDeviceReady, false);

    function normalizeBaseUrl(value) {
        if (!value) return "";
        const trimmed = String(value).trim().replace(/\/+$/, "");
        if (/^https?:\/\//i.test(trimmed)) return trimmed;
        return `https://${trimmed}`;
    }

    function onDeviceReady() {
        const loader = document.getElementById("loading");
        loader.innerText = "Checking biometric authentication...";
        startBiometricCheck();
    }

    function startBiometricCheck() {
        if (!window.Fingerprint) {
            launchKeycloakLogin();
            return;
        }

        Fingerprint.isAvailable(
            function () {
                showBiometricPrompt();
            },
            function () {
                launchKeycloakLogin();
            }
        );
    }

    function showBiometricPrompt() {
        Fingerprint.show(
            {
                title: "ClubSphere",
                subtitle: "Member Authentication",
                description: "Use fingerprint or face to unlock",
                cancelButtonTitle: "Cancel"
            },
            function () {
                attemptRefreshLogin();
            },
            function () {
                launchKeycloakLogin();
            }
        );
    }

    function getSecureStorage() {
        return new Promise((resolve, reject) => {
            if (!window.SecureStorage) {
                reject(new Error("SecureStorage plugin not available"));
                return;
            }
            const storage = new SecureStorage(
                () => resolve(storage),
                err => reject(err),
                STORAGE_NAMESPACE
            );
        });
    }

    function secureGet(storage, key) {
        return new Promise((resolve, reject) => {
            storage.get(
                value => resolve(value),
                err => reject(err),
                key
            );
        });
    }

    function secureSet(storage, key, value) {
        return new Promise((resolve, reject) => {
            storage.set(
                () => resolve(),
                err => reject(err),
                key,
                value
            );
        });
    }

    async function attemptRefreshLogin() {
        const loader = document.getElementById("loading");
        loader.innerText = "Verifying saved session...";

        try {
            const storage = await getSecureStorage();
            const refreshToken = await secureGet(storage, "refresh_token");

            if (!refreshToken) {
                launchKeycloakLogin();
                return;
            }

            loader.innerText = "Refreshing secure session...";
            const refreshResponse = await fetch(BACKEND_BASE_URL + "/mobile/auth/refresh", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ refreshToken })
            });

            if (!refreshResponse.ok) {
                launchKeycloakLogin();
                return;
            }

            const refreshed = await refreshResponse.json();
            const accessToken = refreshed.accessToken || refreshed.access_token;
            const nextRefreshToken = refreshed.refreshToken || refreshed.refresh_token || refreshToken;
            if (!accessToken) {
                launchKeycloakLogin();
                return;
            }

            await secureSet(storage, "access_token", accessToken);
            await secureSet(storage, "refresh_token", nextRefreshToken);

            loader.innerText = "Restoring app session...";
            const sessionResponse = await fetch(BACKEND_BASE_URL + "/mobile/auth/session/login", {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ accessToken, refreshToken: nextRefreshToken })
            });

            if (!sessionResponse.ok) {
                launchKeycloakLogin();
                return;
            }

            const sessionPayload = await sessionResponse.json();
            window.location.href = BACKEND_BASE_URL + (sessionPayload.redirectUrl || "/mobile/channel");
        } catch (e) {
            launchKeycloakLogin();
        }
    }

    function launchKeycloakLogin() {
        document.getElementById("loading").innerText = "Opening secure login...";
        window.location.href = BACKEND_BASE_URL + "/mobile/biometric/bootstrap";
    }

    async function captureSessionTokens() {
        try {
            const response = await fetch(BACKEND_BASE_URL + "/mobile/auth/tokens", {
                method: "GET",
                credentials: "include"
            });
            if (!response.ok) return;
            const tokens = await response.json();
            const accessToken = tokens.accessToken || tokens.access_token;
            const refreshToken = tokens.refreshToken || tokens.refresh_token;
            if (!refreshToken) return;
            const storage = await getSecureStorage();
            if (accessToken) await secureSet(storage, "access_token", accessToken);
            await secureSet(storage, "refresh_token", refreshToken);
        } catch (e) {
            // no-op
        }
    }

    captureSessionTokens();
</script>
</body>
</html>
