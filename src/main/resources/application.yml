spring:
  application:
    name: MyCommunity
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5433/mycommunity}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:020775Rashy!}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
        types:
          print:
            banner: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  ai:
    openai:
      api-key: ${openaiAPI_KEY}
      model: gpt-4o-mini
      chat:
        options:
          model: gpt-4o-mini
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${ISSUER_URI:https://ngcloak-production.up.railway.app/realms/community}

          keycloak-project-client:
            issuer-uri: ${ISSUER_URI_PROJECT_CLIENT:https://ngcloak-production.up.railway.app/realms/projectClient}

          keycloak-project-admin:
            issuer-uri: ${ISSUER_URI_PROJECT_ADMIN:https://ngcloak-production.up.railway.app/realms/projectAdmin}

        registration:
          keycloak:
            provider: keycloak
            client_id: ${KEYCLOAK_CLIENT_ID:community}
            client_secret: ${KEYCLOAK_CLIENT_SECRET:g53shElTTVgGoMej0QJGXP5Z16GDaULU}
            authorization-grant-type: authorization_code
            scope: openid,profile,email

          keycloak-mobile:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID:community}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:g53shElTTVgGoMej0QJGXP5Z16GDaULU}
            authorization-grant-type: authorization_code
            scope: openid,profile,email

          keycloak-project-client:
            provider: keycloak-project-client
            client-id: ${KEYCLOAK_CLIENT_ID_PROJECT_CLIENT:projectClient}
            client-secret: ${KEYCLOAK_CLIENT_SECRET_PROJECT_CLIENT:fVoYPZLVsLETbSp77CgCEj2fq5psIc15}
            authorization-grant-type: authorization_code
            scope: openid,profile,email

          keycloak-project-admin:
            provider: keycloak-project-admin
            client-id: ${KEYCLOAK_CLIENT_ID_PROJECT_ADMIN:projectAdmin}
            client-secret: ${KEYCLOAK_CLIENT_SECRET_PROJECT_ADMIN:kKiSaFloKSAxFBO5AZY3B0nk8oy6TCmJ}
            authorization-grant-type: authorization_code
            scope: openid,profile,email

      resourceserver:
        jwt:
          issuer-uri: ${ISSUER_URI:https://ngcloak-production.up.railway.app/realms/community}

  main:
    allow-bean-definition-overriding: true
error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    codes:
      ProcessModelIdUnique: PROCESS_MODEL_ID_UNIQUE
      ProcessProcessNameUnique: PROCESS_PROCESS_NAME_UNIQUE
      ValidFileType: VALID_FILE_TYPE
